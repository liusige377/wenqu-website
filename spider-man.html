<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜘蛛侠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-icon {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 600; }
        .header-title p { font-size: 13px; opacity: 0.9; margin-top: 3px; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #f5f6fa;
        }
        .message {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }
        .message.user { align-items: flex-end; margin-left: 20%; }
        .message.assistant { align-items: flex-start; margin-right: 20%; }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #666;
        }
        .message.user .message-header { flex-direction: row-reverse; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .message.user .avatar { background: #3498db; color: white; }
        .message.assistant .avatar { background: #e74c3c; color: white; }
        .bubble {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .message.user .bubble {
            background: #3498db;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #e74c3c; }
        .input-area button {
            padding: 14px 28px;
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231,76,60,0.4);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .typing { display: flex; gap: 4px; padding: 10px 16px; }
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🕷️</div>
            <div class="header-title">
                <h1>蜘蛛侠</h1>
            </div>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://101.133.136.55:3000/v1/chat/completions';
        const MODEL = 'lite';
        let messages = [];

        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const avatar = role === 'user' ? '👤' : '🕷️';
            const name = role === 'user' ? '你' : '蜘蛛侠';
            
            msgDiv.innerHTML = `
                <div class="message-header">
                    <div class="avatar">${avatar}</div>
                    <span>${name}</span>
                    <span style="color:#999">${timeStr}</span>
                </div>
                <div class="bubble">${content}</div>
            `;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-header">
                    <div class="avatar">🕷️</div>
                    <span>蜘蛛侠</span>
                </div>
                <div class="bubble typing"><span></span><span></span><span></span></div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return typingDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const content = input.value.trim();
            if (!content) return;

            addMessage('user', content);
            messages.push({ role: 'user', content });
            input.value = '';
            btn.disabled = true;

            const typing = showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.7
                    })
                });

                typing.remove();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '抱歉，我没有理解你的问题。';
                
                addMessage('assistant', reply);
                messages.push({ role: 'assistant', content: reply });
            } catch (err) {
                typing.remove();
                addMessage('assistant', '抱歉，连接出现问题：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        // 欢迎消息
        window.onload = () => {
            addMessage('assistant', '你好！我是蜘蛛侠，有什么可以帮你的吗？');
        };
    </script>
</body>
</html>
