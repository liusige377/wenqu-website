<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问渠AI助手 - 多模型免费聚合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left h1 { font-size: 24px; margin-bottom: 5px; }
        .header-left p { opacity: 0.8; font-size: 13px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .model-select {
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        .model-select option { color: #333; background: white; }
        .model-status { font-size: 11px; opacity: 0.7; }
        .search-status { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,0.2); }
        .search-status.active { background: #4caf50; }
        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 25px 30px;
            background: #f8f9fa;
        }
        .message { display: flex; margin-bottom: 15px; align-items: flex-start; }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .message .bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.6;
            word-break: break-word;
        }
        .message.user .bubble { background: #0f3460; color: white; border-bottom-right-radius: 3px; }
        .message.assistant .bubble { background: white; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 3px; white-space: pre-wrap; }
        .message .model-tag { font-size: 11px; color: #999; margin-top: 4px; padding: 0 5px; }
        .message.user .model-tag { text-align: right; }
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #0f3460; }
        .input-area button {
            padding: 14px 28px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .input-area button:hover { background: #1a4a7a; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .examples {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .examples span { font-size: 12px; color: #666; margin-right: 5px; }
        .examples button {
            padding: 5px 14px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            color: #0f3460;
            transition: all 0.2s;
        }
        .examples button:hover { background: #0f3460; color: white; border-color: #0f3460; }
        .loading { display: flex; gap: 5px; padding: 15px; }
        .loading span {
            width: 8px; height: 8px;
            background: #0f3460;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .key-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .key-btn:hover { background: rgba(255,255,255,0.25); }
        .charged-banner {
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 10px 15px;
            margin: 10px 0;
            font-size: 13px;
            color: #333;
            display: none;
        }
        .charged-banner.show { display: block; }
        .footer-bar {
            padding: 8px 30px;
            background: #f0f0f0;
            font-size: 11px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🧠 问渠AI助手</h1>
                <p>多模型聚合 · 免费使用 · 联网搜索</p>
            </div>
            <div class="header-right">
                <span class="search-status" id="searchStatus">🔍 联网</span>
                <span class="model-status" id="modelStatus">加载中...</span>
                <select class="model-select" id="modelSelect">
                    <option value="google/gemma-3-27b-it">google/gemma-3-27b-it (27B·推荐)</option>
                    <option value="google/gemma-3-12b-it">google/gemma-3-12b-it (12B)</option>
                    <option value="Qwen/Qwen2.5-7B-Instruct">Qwen/Qwen2.5-7B-Instruct (7B)</option>
                    <option value="Qwen/Qwen3-8B">Qwen/Qwen3-8B (8B)</option>
                    <option value="THUDM/GLM-4-9B-0414">THUDM/GLM-4-9B (9B)</option>
                    <option value="THUDM/GLM-Z1-9B-0414">THUDM/GLM-Z1-9B (9B·思考)</option>
                    <option value="deepseek-ai/DeepSeek-R1-Distill-Qwen-7B">DeepSeek-R1-Distill-Qwen-7B (7B)</option>
                    <option value="THUDM/glm-4-flash">THUDM/glm-4-flash (永久免费)</option>
                </select>
                <button class="key-btn" onclick="toggleKeyPanel()">⚙️ API Key</button>
            </div>
        </div>

        <div id="keyPanel" style="display:none; background:#fff3cd; padding:12px 30px; font-size:13px; border-bottom:1px solid #ffeeba;">
            <div style="margin-bottom:8px; font-weight:bold;">API Key 设置</div>
            <input id="wenquKeyInput" placeholder="输入你的问渠API Key (wq-开头)" style="width:300px; padding:6px 10px; border:1px solid #ddd; border-radius:5px;">
            <button onclick="useWenquKey()" style="padding:6px 14px; background:#0f3460; color:white; border:none; border-radius:5px; cursor:pointer;">确定</button>
            <a href="/portal.html" style="margin-left:15px; color:#0f3460;">还没有Key？去注册 →</a>
            <div id="keyInfo" style="margin-top:6px; color:#666;"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="bubble">👋 你好！我是问渠AI助手。

我能回答各种问题，包括：
• 📅 实时日期、星期、时间（直接告诉你）
• 📰 实时新闻、热点事件（联网搜索）
• 🌤️ 天气查询（联网搜索）
• 💬 知识问答、写作、编程等

<strong>直接问我问题即可，实时类问题我会自动联网获取答案。</strong></div>
                <div class="model-tag"></div>
            </div>
        </div>

        <div class="examples">
            <span>试试：</span>
            <button onclick="askExample('今天成都天气怎么样？')">今天成都天气</button>
            <button onclick="askExample('2026年4月有什么重要新闻？')">4月新闻</button>
            <button onclick="askExample('帮我写一首关于春天的诗')">写诗</button>
            <button onclick="askExample('解释一下什么是LNG')">LNG是什么</button>
        </div>

        <div class="input-area">
            <input id="userInput" placeholder="输入问题，按回车发送..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>

        <div class="footer-bar">
            问渠百科 · <a href="/" style="color:#0f3460;">返回首页</a> · 免费API: <a href="/portal.html" style="color:#0f3460;">获取Key</a>
        </div>
    </div>

    <script>
        // ====== 全局状态 ======
        let wenquKey = localStorage.getItem('wenqu_key') || '';
        const WenquBase = 'http://101.133.136.55:3000';
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const modelStatus = document.getElementById('modelStatus');
        const searchStatusEl = document.getElementById('searchStatus');
        let isCharged = false;
        let quotaInfo = { freeRemaining: 10, balance: 0 };

        // ====== 初始化 ======
        function init() {
            if (wenquKey) {
                loadQuotaInfo();
            } else {
                modelStatus.textContent = '👤 游客模式';
                searchStatusEl.classList.add('active');
            }
        }

        // ====== 工具函数 ======
        function addMessage(role, content, modelInfo) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = '<div class="bubble">' + escapeHtml(content) + '</div>' +
                (modelInfo ? '<div class="model-tag">' + modelInfo + '</div>' : '');
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLoading(text) {
            removeLoading();
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loadingMsg';
            div.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>' +
                '<div class="model-tag" id="loadingText">' + (text || '思考中...') + '</div>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setStatus(text) {
            modelStatus.textContent = text;
        }

        // ====== 实时数据 ======
        function getNowInfo() {
            const now = new Date();
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            const wd = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
            const h = String(now.getHours()).padStart(2,'0');
            const mi = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            return {
                text: `${y}年${mo}月${d}日，${wd}\n当前时间：${h}:${mi}:${s}`,
                timestamp: Date.now()
            };
        }

        function isDateTimeQuestion(q) {
            return /今天|昨天|明天|本周|本月|今年|日期|几号|星期|礼拜|几点|几时|现在几点|当前时间/.test(q);
        }

        function isWeatherQuestion(q) {
            return /天气|气温|温度|下雨|下雪|晴天|暴雨|台风|空气|PM2/.test(q);
        }

        function isNewsQuestion(q) {
            return /新闻|热点|最新消息|今日新闻|今天新闻|近期新闻|最近发生/.test(q);
        }

        function isStockQuestion(q) {
            return /股价|股票|大盘|指数|涨跌|期货|LNG价格|天然气价格|油价/.test(q);
        }

        // ====== API 调用 ======
        async function callSmartAI(question, model) {
            const key = wenquKey || 'wq-guest';
            const res = await fetch(WenquBase + '/v1/chat/smart', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: 'user', content: question }],
                    stream: false
                })
            });
            if (!res.ok) {
                const txt = await res.text();
                throw new Error('HTTP ' + res.status + ': ' + txt);
            }
            const data = await res.json();
            if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
            return {
                content: data.content || (data.choices && data.choices[0].message.content) || '无回复',
                model: data.model || model,
                mode: data.mode || 'chat'
            };
        }

        async function loadQuotaInfo() {
            try {
                const res = await fetch(WenquBase + '/v1/balance', {
                    headers: { 'Authorization': 'Bearer ' + wenquKey }
                });
                if (res.ok) {
                    const data = await res.json();
                    quotaInfo = data;
                    updateQuotaDisplay();
                }
            } catch(e) {}
        }

        function updateQuotaDisplay() {
            if (wenquKey) {
                modelStatus.textContent = '✅ 已登录';
                searchStatusEl.classList.add('active');
            } else {
                modelStatus.textContent = '👤 游客';
            }
        }

        function toggleKeyPanel() {
            const panel = document.getElementById('keyPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (wenquKey) document.getElementById('wenquKeyInput').value = wenquKey;
            updateKeyInfo();
        }

        function updateKeyInfo() {
            const info = document.getElementById('keyInfo');
            if (wenquKey) {
                info.innerHTML = '✅ 已设置 Key: ' + wenquKey.substring(0, 12) + '...';
            } else {
                info.innerHTML = '👤 游客模式（使用共享额度，支持联网搜索）';
            }
        }

        function useWenquKey() {
            const key = document.getElementById('wenquKeyInput').value.trim();
            if (!key) return;
            wenquKey = key;
            localStorage.setItem('wenqu_key', key);
            document.getElementById('keyPanel').style.display = 'none';
            updateKeyInfo();
            loadQuotaInfo();
        }

        function askExample(q) {
            userInput.value = q;
            sendMessage();
        }

        // ====== 发送消息 ======
        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            addMessage('user', question);
            userInput.value = '';
            sendBtn.disabled = true;

            const model = modelSelect.value;

            try {
                const q = question.trim();

                // 1. 日期时间类 — 前端直接返回，不调API
                if (isDateTimeQuestion(q)) {
                    const info = getNowInfo();
                    removeLoading();
                    addMessage('assistant', '📅 ' + info.text, '系统实时获取 · 无需联网');
                    setStatus('就绪');
                    sendBtn.disabled = false;
                    userInput.focus();
                    return;
                }

                addLoading('🔍 联网搜索中...');

                // 2. 天气类 — 走后端专用端点，不经过模型
                if (isWeatherQuestion(q)) {
                    try {
                        const cityMatch = q.match(/(成都|北京|上海|广州|深圳|杭州|南京|武汉|西安|重庆|长沙|苏州|天津|郑州|青岛|大连|宁波|厦门|福州|合肥|昆明|贵阳|济南|沈阳|哈尔滨|长春|太原|石家庄|兰州|银川|西宁|海口|三亚|拉萨|乌鲁木齐|呼和浩特|南昌|南宁)/);
                        const city = cityMatch ? cityMatch[1] : '成都';
                        const wRes = await fetch(WenquBase + '/v1/weather?city=' + encodeURIComponent(city));
                        const wData = await wRes.json();
                        if (wData.reply) {
                            removeLoading();
                            addMessage('assistant', '🌤️ ' + wData.reply, 'wttr.in 实时数据 · ' + city);
                            setStatus('就绪');
                            sendBtn.disabled = false;
                            userInput.focus();
                            return;
                        }
                    } catch(e) { console.log('天气API失败，降级走smart', e); }
                }

                // 3. 新闻类 — 走后端专用端点，不经过模型
                if (isNewsQuestion(q)) {
                    try {
                        const nRes = await fetch(WenquBase + '/v1/news?q=' + encodeURIComponent(q));
                        const nData = await nRes.json();
                        if (nData.reply) {
                            removeLoading();
                            addMessage('assistant', '📰 ' + nData.reply, '新浪RSS 实时数据');
                            setStatus('就绪');
                            sendBtn.disabled = false;
                            userInput.focus();
                            return;
                        }
                    } catch(e) { console.log('新闻API失败，降级走smart', e); }
                }

                // 4. 其他问题走smart接口（后端搜索增强+模型）
                const nowInfo = getNowInfo();
                const enhancedQuestion = '【当前时间：' + nowInfo.text + '】\n用户问题：' + q;

                const result = await callSmartAI(enhancedQuestion, model);

                removeLoading();

                let tag = result.model.split('/').pop();
                if (result.mode === 'smart-search') {
                    tag = '🔍 联网 · ' + tag;
                    searchStatusEl.classList.add('active');
                }
                addMessage('assistant', result.content, tag);
                setStatus('就绪');

            } catch(e) {
                removeLoading();
                let err = e.message;
                if (err.includes('402') || err.includes('余额')) {
                    err = '💰 余额不足，请联系客服「四哥」充值';
                }
                addMessage('assistant', '⚠️ 服务暂时不可用：' + err, '');
                setStatus('出错');
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        init();
    </script>
</body>
</html>
