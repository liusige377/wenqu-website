    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const modelStatus = document.getElementById('modelStatus');
        const searchStatus = document.getElementById('searchStatus');

        // 根据当前页面协议自动选择API协议（避免Mixed Content）
        const WENQU_BASE = (window.location.protocol === 'https:') 
            ? 'https://101.133.136.55'  // HTTPS页面（会有警告）
            : 'http://101.133.136.55';   // HTTP页面（正常工作）

        let wenquKey = localStorage.getItem('wenqu_api_key') || '';
        let useWenqu = !!wenquKey;
        let vipInfo = { isVip: false, vipDaysRemaining: 0, vipExpiryDate: null, freeRemaining: 10 };

        const REALTIME_KEYWORDS = [
            '今天','昨天','明天','本周','本月','今年','近期',
            '新闻','热点','最新','现在','此刻','实时',
            '天气','气温','下雨','晴天','暴雨','地震',
            '股票','股价','行情','涨跌','大盘','指数',
            'lng价格','天然气价格','油价','期货'
        ];

        function init() {
            updateQuotaDisplay();
            if (wenquKey) loadVipStatus();
        }

        function addMessage(role, content, modelInfo) {
            const msg = document.createElement('div');
            msg.className = 'message ' + role;
            msg.innerHTML = '<div class="bubble">' + escapeHtml(content) + '</div>' +
                (modelInfo ? '<div class="model-tag">' + modelInfo + '</div>' : '');
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loadingMsg');
            if (loading) loading.remove();
        }

        function addLoading(text) {
            removeLoading();
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'loadingMsg';
            msg.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>' +
                '<div class="model-tag">' + (text || '思考中...') + '</div>';
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function askExample(q) {
            userInput.value = q;
            sendMessage();
        }

        function setStatus(text) {
            modelStatus.textContent = text;
        }

        function getDateTimeInfo() {
            const now = new Date();
            return '今天是' + now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日，' +
                ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()] + '\n' +
                '当前时间：' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        }

        function needsRealtime(question) {
            return REALTIME_KEYWORDS.some(kw => question.toLowerCase().includes(kw));
        }

        function toggleKeyPanel() {
            document.getElementById('keyPanel').classList.toggle('show');
            if (wenquKey) document.getElementById('wenquKeyInput').value = wenquKey;
            updateKeyInfo();
        }

        function updateKeyInfo() {
            const info = document.getElementById('keyInfo');
            if (wenquKey) {
                if (vipInfo.isVip) {
                    const exp = vipInfo.vipExpiryDate ? new Date(vipInfo.vipExpiryDate).toLocaleDateString('zh-CN') : '未知';
                    info.innerHTML = '<span style="color:#7c5cfc;font-weight:bold;">👑 VIP会员</span><br>到期：' + exp + '（剩余' + vipInfo.vipDaysRemaining + '天）<br><a href="/portal.html" style="color:#0f3460;">续费/查看详情 →</a>';
                } else {
                    info.innerHTML = '✅ 已登录 · 每日' + vipInfo.freeRemaining + '次免费<br>升级VIP：无限次使用<br><a href="/portal.html" style="color:#0f3460;">立即升级 →</a>';
                }
            } else {
                info.innerHTML = '👤 游客模式<br><a href="/portal.html" style="color:#0f3460;">注册账号获取免费额度</a>';
            }
        }

        async function useWenquKey() {
            const key = document.getElementById('wenquKeyInput').value.trim();
            if (!key || !key.startsWith('wq-')) {
                alert('请输入有效的问渠 API Key（以 wq- 开头）');
                return;
            }
            wenquKey = key;
            useWenqu = true;
            localStorage.setItem('wenqu_api_key', wenquKey);
            document.getElementById('keyPanel').classList.remove('show');
            updateQuotaDisplay();
            await loadVipStatus();
        }

        function updateQuotaDisplay() {
            const sel = document.getElementById('modelSelect');
            const old = sel.parentElement.querySelector('.quota-bar');
            if (old) old.remove();
            const bar = document.createElement('span');
            bar.className = 'quota-bar';
            if (vipInfo.isVip) {
                bar.className += ' quota-vip';
                bar.textContent = '👑 VIP ' + vipInfo.vipDaysRemaining + '天';
            } else if (vipInfo.freeRemaining > 0) {
                bar.className += ' quota-free';
                bar.textContent = '🎁 ' + vipInfo.freeRemaining + '次免费';
            } else {
                bar.className += ' quota-empty';
                bar.textContent = '⚠️ 额度用完';
            }
            sel.parentElement.appendChild(bar);
        }

        async function loadVipStatus() {
            if (!wenquKey) return;
            try {
                const r = await fetch(WENQU_BASE + '/v1/vip/status', {
                    headers: { 'Authorization': 'Bearer ' + wenquKey }
                });
                if (r.ok) {
                    const d = await r.json();
                    vipInfo = {
                        isVip: d.isVip || false,
                        vipDaysRemaining: d.vipDaysRemaining || 0,
                        vipExpiryDate: d.vipExpiryDate || null,
                        freeRemaining: d.freeRemaining !== undefined ? d.freeRemaining : 10
                    };
                } else {
                    // fallback: treat as non-vip with 10 free
                    vipInfo = { isVip: false, vipDaysRemaining: 0, vipExpiryDate: null, freeRemaining: 10 };
                }
            } catch(e) {
                vipInfo = { isVip: false, vipDaysRemaining: 0, vipExpiryDate: null, freeRemaining: 10 };
            }
            updateQuotaDisplay();
            updateKeyInfo();
        }

        async function callAI(prompt, model, useSmart = false) {
            setStatus(useSmart ? '实时查询中...' : 'AI思考中...');
            const endpoint = useSmart ? '/v1/chat/smart' : '/v1/chat/completions';
            const response = await fetch(WENQU_BASE + endpoint, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + wenquKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: 'user', content: prompt }],
                    stream: false
                })
            });

            const data = await response.json();
            if (response.status === 429) {
                throw new Error('⚠️ 今日免费10次已用完！\n\n升级VIP会员即可无限次使用。\n请前往 <a href="/portal.html" target="_blank">问渠平台</a> 购买VIP。');
            }
            if (response.status === 402) {
                throw new Error('💰 余额不足！请联系客服「四哥」充值。');
            }
            if (!response.ok) {
                throw new Error('请求失败 HTTP ' + response.status + ': ' + (data.error?.message || JSON.stringify(data)));
            }
            // 更新配额
            await loadVipStatus();
            // smart端点直接返回content
            if (useSmart && data.content) {
                return { content: data.content, model: data.model || model, mode: data.mode, category: data.category };
            }
            return { content: data.choices[0].message.content, model: model };
        }

        async function sendMessage() {
            if (!wenquKey) {
                addMessage('assistant', '⚠️ 请先设置 API Key 才能使用！\n\n点击右上角 🔑 按钮输入您的问渠Key。\n还没有Key？前往 https://wenquso.cn/portal.html 免费注册！');
                return;
            }
            const question = userInput.value.trim();
            if (!question) return;
            addMessage('user', question);
            userInput.value = '';
            sendBtn.disabled = true;
            const model = modelSelect.value;

            try {
                const q = question.toLowerCase();
                
                // 检测实时问题类型（优先级：新闻 > 天气 > 日期时间）
                const isNews = /新闻|热点|最近发生|最新消息|大事|news|头条|今天.*新闻|今日.*新闻|有什么新闻|发生什么事/i.test(q) && !/代码|程序|函数|API|编程|怎么写|如何实现/i.test(q);
                const isWeather = /天气|气温|温度|下雨|下雪|晴天|台风|weather/i.test(q) && !/代码|程序|函数|API|编程|怎么写|如何实现/i.test(q);
                const isDateTime = /今天|日期|几号|星期|礼拜|几点|时间|现在|当前/i.test(q);

                // 新闻走smart端点（最高优先级，避免被日期匹配覆盖）
                if (isNews) {
                    addLoading('获取新闻中...');
                    const result = await callAI(question, model, true);
                    removeLoading();
                    const tag = result.mode === 'smart-direct' ? 
                        (result.category + ' · 实时获取') : 
                        ('模型: ' + result.model.split('/').pop());
                    addMessage('assistant', result.content, tag);
                    setStatus('就绪');
                    sendBtn.disabled = false;
                    userInput.focus();
                    return;
                }

                // 天气走smart端点
                if (isWeather) {
                    addLoading('查询天气中...');
                    const result = await callAI(question, model, true);
                    removeLoading();
                    const tag = result.mode === 'smart-direct' ? 
                        (result.category + ' · 实时获取') : 
                        ('模型: ' + result.model.split('/').pop());
                    addMessage('assistant', result.content, tag);
                    setStatus('就绪');
                    sendBtn.disabled = false;
                    userInput.focus();
                    return;
                }

                // 日期时间直接本地返回（排除已处理的新闻和天气）
                if (isDateTime) {
                    addLoading(isWeather ? '查询天气中...' : '获取新闻中...');
                    const result = await callAI(question, model, true); // useSmart=true
                    removeLoading();
                    const tag = result.mode === 'smart-direct' ? 
                        (result.category + ' · 实时获取') : 
                        ('模型: ' + result.model.split('/').pop());
                    addMessage('assistant', result.content, tag);
                    setStatus('就绪');
                    sendBtn.disabled = false;
                    userInput.focus();
                    return;
                }

                // 其他问题走普通completions
                addLoading('AI思考中...');
                let prompt = question;
                if (needsRealtime(question)) {
                    prompt = '当前时间信息：\n' + getDateTimeInfo() + '\n\n用户问题：' + question + '\n\n请回答。';
                }
                const result = await callAI(prompt, model, false);
                removeLoading();
                addMessage('assistant', result.content, '模型: ' + result.model.split('/').pop());
                setStatus('就绪');
            } catch (e) {
                removeLoading();
                addMessage('assistant', e.message, '');
                setStatus('出错');
            }
            sendBtn.disabled = false;
            userInput.focus();
        }

        
        // ===== 登录/注册弹窗 [v3.0] =====
        let currentAuthMode = 'login';

        function openAuthModal(mode) {
            currentAuthMode = mode || 'login';
            document.getElementById('authModalOverlay').classList.add('show');
            document.getElementById('authError').textContent = '';
            switchAuthTab(mode);
        }

        function closeAuthModal() {
            document.getElementById('authModalOverlay').classList.remove('show');
        }

        function switchAuthTab(mode) {
            currentAuthMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const title = document.getElementById('authModalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const nameGroup = document.getElementById('registerNameGroup');
            const footer = document.getElementById('authFooter');

            if (mode === 'login') {
                tabLogin.classList.add('active'); tabRegister.classList.remove('active');
                title.textContent = '登录';
                submitBtn.textContent = '登 录';
                nameGroup.classList.remove('show');
                footer.textContent = '首次登录即自动注册';
            } else {
                tabRegister.classList.add('active'); tabLogin.classList.remove('active');
                title.textContent = '注册';
                submitBtn.textContent = '注 册';
                nameGroup.classList.add('show');
                footer.textContent = '已有账号？点击登录即可';
            }
            document.getElementById('authError').textContent = '';
        }

        async function doAuthAction() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');
            const btn = document.getElementById('authSubmitBtn');

            if (!email || !password) {
                errorEl.textContent = '⚠️ 请填写邮箱和密码'; return;
            }
            if (password.length < 6) {
                errorEl.textContent = '⚠️ 密码至少6位'; return;
            }

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = currentAuthMode === 'login' ? '登录中...' : '注册中...';

            try {
                const isHttps = window.location.protocol === 'https:';
                let result;

                if (isHttps) {
                    // HTTPS环境：用allorigins代理
                    const url = API_BASE + '/v1/auth/' + (currentAuthMode === 'login' ? 'login' : 'register');
                    const body = JSON.stringify({ email, password });
                    if (currentAuthMode === 'register') {
                        const name = document.getElementById('authName').value.trim() || '问渠用户';
                        body = JSON.stringify({ email, password, name });
                    }
                    const proxyUrl = 'https://api.allorigins.win/post?url=' + encodeURIComponent(url);
                    const r = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    const wrapped = await r.json();
                    result = JSON.parse(wrapped.contents);
                } else {
                    // HTTP环境：直接请求
                    const url = API_BASE + '/v1/auth/' + (currentAuthMode === 'login' ? 'login' : 'register');
                    const body = JSON.stringify({ email, password });
                    if (currentAuthMode === 'register') {
                        const name = document.getElementById('authName').value.trim() || '问渠用户';
                        body = JSON.stringify({ email, password, name });
                    }
                    const r = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    result = await r.json();
                }

                if (result.userId || result.token || result.success) {
                    // 登录/注册成功
                    const userData = {
                        userId: result.userId,
                        email: result.email || email,
                        name: result.name || (currentAuthMode === 'register' ? (document.getElementById('authName').value.trim() || '问渠用户') : ''),
                        token: result.token,
                        apiKey: result.apiKey || (result.apiKeys && result.apiKeys[0] ? result.apiKeys[0].key : null),
                        apiKeys: result.apiKeys || []
                    };
                    localStorage.setItem('wenqu_user', JSON.stringify(userData));
                    closeAuthModal();
                    updateAuthUI();
                    
                    // 显示成功提示
                    const welcomeMsg = document.getElementById('welcomeMsg');
                    if (welcomeMsg) {
                        const firstBubble = welcomeMsg.querySelector('.bubble');
                        if (firstBubble) {
                            firstBubble.innerHTML = '✅ ' + (currentAuthMode === 'register' ? '注册成功！' : '登录成功！') + ' 欢迎，' + (userData.name || userData.email) + ' 🎉';
                        }
                    }
                } else {
                    errorEl.textContent = result.error || result.message || '操作失败，请重试';
                }
            } catch(e) {
                console.error('[Auth Error]', e);
                errorEl.textContent = '网络错误: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = currentAuthMode === 'login' ? '登 录' : '注 册';
            }
        }

        // 点击遮罩层关闭
        document.getElementById('authModalOverlay')?.addEventListener('click', function(e) {
            if (e.target === this) closeAuthModal();
        });

        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeAuthModal();
        });

        // ===== 用户认证状态 =====
        const API_BASE = 'http://101.133.136.55:3000';

        async function wenquFetch(url, opts) {
            const proxyUrl = 'https://api.allorigins.win/' + (opts?.method === 'POST' ? 'post' : 'get') + '?url=' + encodeURIComponent(url);
            const r = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...opts?.headers },
                body: opts?.body
            });
            const wrapped = await r.json();
            const httpStatus = wrapped.status?.http_code || 200;
            const data = JSON.parse(wrapped.contents);
            const mockResponse = {
                ok: httpStatus >= 200 && httpStatus < 300,
                status: httpStatus,
                json: () => Promise.resolve(data)
            };
            if (data.error) mockResponse.ok = false;
            return mockResponse;
        }

        function updateAuthUI() {
            const saved = localStorage.getItem('wenqu_user');
            const guestEl = document.getElementById('authButtonsGuest');
            const userEl = document.getElementById('authButtonsUser');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user && user.userId) {
                        guestEl.style.display = 'none';
                        userEl.style.display = 'flex';
                        userEl.style.alignItems = 'center';
                        userEl.style.gap = '8px';
                        const name = user.name || user.email || '用户';
                        document.getElementById('userName').textContent = name;
                        document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
                        // 更新欢迎消息
                        updateWelcomeMsg(name);
                        // 显示余额
                        loadUserBalance(user);
                        return;
                    }
                } catch(e) {}
            }
            guestEl.style.display = 'inline-flex';
            guestEl.style.gap = '8px';
            userEl.style.display = 'none';
        }

        function updateWelcomeMsg(name) {
            const welcomeMsg = document.getElementById('welcomeMsg');
            if (!welcomeMsg) return;
            const firstBubble = welcomeMsg.querySelector('.bubble');
            if (!firstBubble) return;
            const hasKey = (JSON.parse(localStorage.getItem('wenqu_user')||'{}').apiKeys?.length > 0);
            firstBubble.innerHTML = `👋 您好，${name}！欢迎回到问渠AI助手。

您的专属AI助手已就绪，支持联网搜索、多模型切换。

• 余额充足：畅享所有AI模型
• 充值送费：点击右上角「充值」享优惠
• 管理API Key：<a href="portal.html" style="color:#7c5cfc;text-decoration:underline;">前往用户中心</a>

请选择模型，开始提问吧！`;
        }

        async function loadUserBalance(user) {
            const key = user.apiKeys?.[0]?.key || null;
            if (!key) return;
            try {
                const r = await wenquFetch(API_BASE + '/v1/balance?userId=' + user.userId, {
                    headers: { 'Authorization': 'Bearer ' + key }
                });
                const d = await r.json();
                if (!d.error && d.totalBalance !== undefined) {
                    document.getElementById('userBalance').textContent = d.totalBalance.toFixed(2);
                }
            } catch(e) {}
        }

        function userLogout() {
            localStorage.removeItem('wenqu_user');
            updateAuthUI();
        }

        // ===== HTTPS警告处理 =====
        function switchToHttp() {
            var httpUrl = window.location.href.replace('https:', 'http:');
            window.location.href = httpUrl;
        }
        
        // 显示HTTPS警告
        if (window.__HTTPS_WARNING__) {
            document.body.classList.add('has-warning');
            document.getElementById('httpsWarning').classList.add('show');
        }
        
        // ===== 原有init =====
        init();
        // 页面加载后更新认证状态
        updateAuthUI();
    </script>

    <!-- 登录/注册弹窗 [v3.0] -->
    <div class="auth-modal-overlay" id="authModalOverlay">
        <div class="auth-modal">
            <div class="auth-modal-header">
                <h3 id="authModalTitle">登录</h3>
                <button class="auth-modal-close" onclick="closeAuthModal()">&times;</button>
            </div>
            <div class="auth-modal-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</div>
                <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</div>
            </div>
            <div class="auth-modal-body">
                <!-- 注册时显示姓名输入 -->
                <div class="auth-form-group auth-form-register-name" id="registerNameGroup">
                    <label>姓名</label>
                    <input type="text" id="authName" placeholder="请输入您的姓名">
                </div>
                <div class="auth-form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="authEmail" placeholder="example@mail.com" value="">
                </div>
                <div class="auth-form-group">
                    <label>密码</label>
                    <input type="password" id="authPassword" placeholder="请输入密码（至少6位）">
                </div>
                <button class="auth-btn-submit" id="authSubmitBtn" onclick="doAuthAction()">登 录</button>
                <div class="auth-error" id="authError"></div>
                <div class="auth-footer" id="authFooter">首次登录即自动注册</div>
            </div>
        </div>
    </div>
