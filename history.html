<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史文化 — 问渠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}
header{padding:30px 0 20px;text-align:center}
.nav-back{display:inline-flex;align-items:center;gap:6px;color:#d4af37;text-decoration:none;font-size:.9rem;padding:8px 16px;border:1px solid rgba(212,175,55,.3);border-radius:8px;transition:all .3s}
.nav-back:hover{background:rgba(212,175,55,.1)}
header h1{font-size:2rem;color:#d4af37;margin:15px 0 8px;letter-spacing:.1em}
header p{color:#888;font-size:.9rem}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding-bottom:40px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:12px;overflow:hidden}
.tool-header{width:100%;background:none;border:none;color:#e8e8e8;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:1rem;text-align:left;font-family:inherit}
.tool-header:hover{background:rgba(212,175,55,.06)}
.tool-header h3{color:#d4af37;font-size:1rem}
.tool-header .arrow{color:#d4af37;font-size:1.2rem;transition:transform .3s}
.tool-body{padding:0 20px 20px;display:none}
.tool-body.open{display:block}
.form-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
input,select{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
select{width:auto;min-width:120px}
.btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;width:100%;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
.result-box{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:16px;margin-top:12px;font-size:.9rem;line-height:1.8;display:none}
.result-box.show{display:block}
.result-box .label{color:#d4af37;font-weight:600}
.result-box .value{color:#fff}
.result-box .era-section{margin-top:12px;padding-top:12px;border-top:1px solid rgba(212,175,55,.2)}
.result-box .era-title{color:#d4af37;font-weight:600;font-size:1rem;margin-bottom:8px}
.result-box .era-content{color:#ccc;line-height:1.7}
.result-box .figure-item{display:inline-block;background:rgba(212,175,55,.15);color:#d4a855;padding:3px 10px;border-radius:5px;margin:3px 5px 3px 0;font-size:.88rem}
.result-box .event-item{color:#aaa;margin:4px 0;padding-left:12px;position:relative}
.result-box .event-item::before{content:'•';position:absolute;left:0;color:#d4af37}
.tip{color:#888;font-size:.8rem;margin-top:8px}
footer{text-align:center;padding:30px 0;color:#555;font-size:.8rem}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <header>
    <a href="index.html" class="nav-back">← 返回首页</a>
    <h1>🏛️ 历史文化</h1>
    <p>朝代更迭，岁月留痕</p>
  </header>
  <div class="tools-grid">

    <div class="tool-card" id="converter">
      <button class="tool-header" onclick="toggle(this)">
        <h3>🏛️ 朝代年份换算</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">输入公元年份，自动推算所属朝代、都城与皇帝年号</p>
        <div class="form-row">
          <input type="number" id="year-input" placeholder="输入公元年份（如：2026）" onkeydown="if(event.key==='Enter')calcYear()">
        </div>
        <button class="btn" onclick="calcYear()">查询</button>
        <div class="result-box" id="year-result"></div>
      </div>
    </div>

    <div class="tool-card" id="era-profile">
      <button class="tool-header" onclick="toggle(this)">
        <h3>📜 年代人物档案</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">输入年份，查看那个年代的著名人物、历史事件和时代背景</p>
        <div class="form-row">
          <input type="number" id="era-input" placeholder="输入年份（如：1949、1900、1980）" onkeydown="if(event.key==='Enter')calcEraProfile()">
        </div>
        <button class="btn" onclick="calcEraProfile()">查询</button>
        <div class="result-box" id="era-result"></div>
      </div>
    </div>

    <div class="tool-card" id="coin">
      <button class="tool-header" onclick="toggle(this)">
        <h3>💰 古代货币换算</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="coin-amount" placeholder="金额" onkeydown="if(event.key==='Enter')calcCoin()">
          <select id="coin-unit">
            <option value="wen">铜钱（文）</option>
            <option value="liang">两白银</option>
            <option value="guan">贯（1000文）</option>
          </select>
        </div>
        <button class="btn" onclick="calcCoin()">换算</button>
        <div class="result-box" id="coin-result"></div>
        <p class="tip">注：历史学家估算差异极大，此为参考中间值</p>
      </div>
    </div>

    <div class="tool-card" id="zodiac">
      <button class="tool-header" onclick="toggle(this)">
        <h3>🐉 生肖属相查询</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="zodiac-year" placeholder="年份（如：1990）" onkeydown="if(event.key==='Enter')calcZodiac()">
        </div>
        <button class="btn" onclick="calcZodiac()">查询</button>
        <div class="result-box" id="zodiac-result"></div>
      </div>
    </div>

    <div class="tool-card" id="era">
      <button class="tool-header" onclick="toggle(this)">
        <h3>📅 纪年对照</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">填任意一项，回车自动换算其他两项</p>
        <div class="form-row">
          <input type="number" id="era-gong" placeholder="公元年" oninput="calcEra('gong')">
          <input type="number" id="era-min" placeholder="民国年" oninput="calcEra('min')">
          <input type="text" id="era-ganzhi" placeholder="干支（如：甲子）" oninput="calcEra('gz')">
        </div>
        <div class="result-box" id="nian-result"></div>
      </div>
    </div>

    <div class="tool-card" id="surname">
      <button class="tool-header" onclick="toggle(this)">
        <h3>📖 百家姓查询</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="text" id="surname-input" placeholder="输入姓氏（如：张）" onkeydown="if(event.key==='Enter')calcSurname()" maxlength="4">
        </div>
        <button class="btn" onclick="calcSurname()">查询</button>
        <div class="result-box" id="surname-result"></div>
      </div>
    </div>

  </div>
  <footer>© 2026 问渠 · 有问必有答</footer>
</div>
<script>
// 粒子背景
(function(){
  var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),particles=[],w,h;
  function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<80;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,alpha:Math.random()*0.5+0.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(212,175,55,${p.alpha})`;ctx.fill()}
    for(var i=0;i<particles.length;i++)for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(212,175,55,${0.06*(1-dist/150)})`;ctx.lineWidth=0.5;ctx.stroke()}}
    requestAnimationFrame(draw);
  }draw();
})();

function toggle(btn){var body=btn.nextElementSibling,arrow=btn.querySelector('.arrow');body.classList.toggle('open');arrow.textContent=body.classList.contains('open')?'▲':'▼'}
function show(el,html){el.innerHTML=html;el.classList.add('show')}

// 年代人物数据库
var ERAS=[
  {s:1840,e:1911,n:'晚清时期',bg:'中国近代史开端，西方列强入侵，民族危机加深，屡次改革失败',ev:['鸦片战争(1840)','太平天国运动(1851)','第二次鸦片战争(1856)','洋务运动(1861)','中法战争(1883)','甲午战争(1894)','戊戌变法(1898)','义和团运动(1899)','八国联军侵华(1900)'],fig:{政:['曾国藩','李鸿章','左宗棠','张之洞','慈禧太后','光绪帝','康有为','梁启超','袁世凯'],科:['詹天佑','冯如','徐寿','华蘅芳'],文:['曹雪芹','吴敬梓','刘鹗','李伯元','吴沃尧'],思:['严复','谭嗣同','黄遵宪']}},
  {s:1912,e:1927,n:'北洋政府时期',bg:'民国初年军阀混战，新文化运动兴起，思想解放',ev:['中华民国成立(1912)','袁世凯称帝(1915)','新文化运动(1915)','五四运动(1919)','中国共产党成立(1921)','北伐战争(1926)'],fig:{政:['孙中山','袁世凯','黎元洪','段祺瑞','蒋介石','汪精卫'],军:['冯玉祥','张作霖','吴佩孚','孙传芳'],思:['陈独秀','李大钊','胡适','鲁迅','蔡元培'],科:['竺可桢','李四光','侯德榜']}},
  {s:1927,e:1949,n:'南京国民政府时期',bg:'国共对峙、抗日战争、解放战争，社会剧烈动荡',ev:['南京国民政府成立(1927)','井冈山革命根据地(1927)','九一八事变(1931)','长征(1934)','西安事变(1936)','卢沟桥事变(1937)','抗战胜利(1945)','三大战役(1948)'],fig:{政:['蒋介石','毛泽东','周恩来','朱德','刘少奇'],军:['彭德怀','林彪','刘伯承','粟裕','白崇禧'],文:['鲁迅','郭沫若','茅盾','老舍','巴金','沈从文'],艺:['徐悲鸿','齐白石','梅兰芳','聂耳','冼星海']}},
  {s:1949,e:1966,n:'新中国成立初期',bg:'中国人民站起来，社会主义改造完成，工业化起步',ev:['开国大典(1949)','抗美援朝(1950)','三大改造完成(1956)','三大工程(1953-57)','大跃进(1958)','人民公社化(1958)'],fig:{政:['毛泽东','周恩来','刘少奇','朱德','陈云','邓小平'],科:['钱学森','邓稼先','李四光','竺可桢','华罗庚','钱三强'],文:['郭沫若','茅盾','老舍','曹禺'],艺:['徐悲鸿','齐白石','梅兰芳','傅抱石']}},
  {s:1966,e:1976,n:'文化大革命时期',bg:'十年动乱，知识分子下乡、文化受到摧残，国民经济倒退',ev:['文革开始(1966)','红卫兵运动(1966)','上山下乡(1968)','林彪事件(1971)','中美接触(1972)'],fig:{政:['毛泽东','周恩来','林彪','江青','华国锋'],科:['袁隆平','陈景润'],文:['浩然','八个样板戏作者'],艺:['样板戏演员群体']}},
  {s:1977,e:1991,n:'改革开放初期',bg:'拨乱反正、改革开放、经济腾飞、思想解放',ev:['恢复高考(1977)','改革开放(1978)','家庭联产承包(1978)','深圳特区(1980)','万元户时代(1980s)'],fig:{政:['邓小平','胡耀邦','赵紫阳','江泽民'],经:['袁庚','步鑫生','年广久'],文:['路遥','莫言','余华','王朔'],艺:['崔健','张艺谋','陈凯歌','姜文']}},
  {s:1992,e:2002,n:'市场经济时期',bg:'南巡讲话、市场经济确立、国企改革、加入WTO进程',ev:['南巡讲话(1992)','建立市场经济体制(1993)','香港回归(1997)','澳门回归(1999)','中国入世(2001)'],fig:{政:['江泽民','朱镕基','胡锦涛'],商:['马云','马化腾','李彦宏','刘强东','王健林'],文:['贾平凹','王小波','韩寒','郭敬明'],艺:['周杰伦','王菲','赵薇','章子怡']}},
  {s:2003,e:2012,n:'黄金十年',bg:'经济高速增长、北京奥运、航天突破、互联网崛起',ev:['非典(2003)','神舟五号(2003)','北京奥运(2008)','上海世博(2010)','GDP超日本(2010)'],fig:{政:['胡锦涛','温家宝','习近平'],科:['杨利伟','神舟飞船团队'],商:['马云','马化腾','雷军','刘强东'],文:['莫言','刘慈欣','韩寒'],艺:['周杰伦','李宇春','姚明','刘翔']}},
  {s:2013,e:2025,n:'新时代',bg:'脱贫攻坚、中国梦、科技强国、文化自信、百年奋斗目标实现',ev:['一带一路(2013)','屠呦呦获诺奖(2015)','供给侧改革(2016)','新冠疫情(2020)','全面建成小康社会(2021)','建党百年(2021)'],fig:{政:['习近平','李克强','王岐山'],科:['科学院工程院院士群体','嫦娥团队','北斗团队'],商:['张一鸣','黄峥','王兴','程维'],文:['刘慈欣','郝景芳','余华'],艺:['吴京','流浪地球团队','国漫团队']}}
];

function calcYear(){
  var y=parseInt(document.getElementById('year-input').value);
  var el=document.getElementById('year-result');
  if(!y&&y!==0){show(el,'<span style="color:#f88">请输入有效年份</span>');return}
  var DY=[{n:'夏',s:-2070,e:-1600,c:'斟鄩',hz:'禹'},{n:'商',s:-1600,e:-1046,c:'殷',hz:'汤'},{n:'西周',s:-1046,e:-771,c:'镐京',hz:'武王'},{n:'东周',s:-770,e:-256,c:'洛邑',hz:'平王'},{n:'秦',s:-221,e:-207,c:'咸阳',hz:'始皇'},{n:'西汉',s:-206,e:8,c:'长安',hz:'高祖'},{n:'东汉',s:25,e:220,c:'洛阳',hz:'光武'},{n:'三国',s:220,e:280,c:'魏蜀吴',hz:'魏文帝等'},{n:'西晋',s:265,e:316,c:'洛阳',hz:'武帝'},{n:'东晋',s:317,e:420,c:'建康',hz:'元帝'},{n:'南北朝',s:420,e:589,c:'南北对峙',hz:'多朝代'},{n:'隋',s:581,e:618,c:'长安',hz:'文帝'},{n:'唐',s:618,e:907,c:'长安',hz:'高祖'},{n:'五代十国',s:907,e:960,c:'中原更迭',hz:'多朝代'},{n:'北宋',s:960,e:1127,c:'开封',hz:'太祖'},{n:'南宋',s:1127,e:1279,c:'临安',hz:'高宗'},{n:'元',s:1271,e:1368,c:'大都',hz:'世祖'},{n:'明',s:1368,e:1644,c:'北京',hz:'太祖'},{n:'清',s:1644,e:1912,c:'北京',hz:'世祖'}];
  var era='';
  if(y<0){var d=DY.find(function(d){return y>=d.s&&y<d.e});era=d?'公元前'+Math.abs(y)+'年 → '+d.n+'时期，都城：'+d.c:'先秦时期'}
  else if(y<1840){var d=DY.find(function(d){return y>=d.s&&y<d.e});era=d?d.n+'时期，都城：'+d.c:'未匹配朝代'}
  else if(y<1949){era='民国时期，民国'+(y-1911)+'年'}
  else{era='中华人民共和国时期'}
  show(el,era);
}

function calcEraProfile(){
  var y=parseInt(document.getElementById('era-input').value);
  var el=document.getElementById('era-result');
  if(!y){show(el,'<span style="color:#f88">请输入有效年份</span>');return}
  var era=ERAS.find(function(e){return y>=e.s&&y<=e.e});
  if(!era){show(el,'暂无该年份数据，请输入1840年之后的年份');return}
  var html='<div class="era-title">'+y+'年 · '+era.n+'</div>';
  html+='<div class="era-content" style="color:#aaa;margin-bottom:10px">'+era.bg+'</div>';
  
  html+='<div class="era-section"><div class="era-title" style="font-size:.95rem">📅 重要事件</div>';
  era.ev.forEach(function(e){html+='<div class="event-item">'+e+'</div>'});
  html+='</div>';
  
  html+='<div class="era-section"><div class="era-title" style="font-size:.95rem">👥 著名人物</div>';
  var categories={政:'政治家',军:'军事家',思:'思想家',科:'科学家',经:'企业家',商:'企业家',文:'文学家',艺:'艺术家'};
  for(var cat in era.fig){
    if(era.fig[cat].length>0){
      html+='<div style="color:#888;font-size:.8rem;margin:8px 0 4px">'+(categories[cat]||cat)+'：</div>';
      html+='<div style="line-height:2">';
      era.fig[cat].forEach(function(f){html+='<span class="figure-item">'+f+'</span>'});
      html+='</div>';
    }
  }
  html+='</div>';
  show(el,html);
}

function calcCoin(){
  var amt=parseFloat(document.getElementById('coin-amount').value);
  var unit=document.getElementById('coin-unit').value;
  var el=document.getElementById('coin-result');
  if(!amt&&amt!==0){show(el,'<span style="color:#f88">请输入金额</span>');return}
  var rates={wen:0.5,liang:200,guan:500};
  var labels={wen:'枚铜钱',liang:'两白银',guan:'贯铜钱'};
  var rmb=(amt*rates[unit]).toFixed(2);
  show(el,'<span class="value">'+amt+labels[unit]+'</span>≈ 约 <span class="value" style="color:#d4af37;font-size:1.1em">人民币 '+rmb+' 元</span><br><small style="color:#888">参考：唐宋1两≈500-1000元，清末1两≈50-100元，取中间值</small>');
}

function calcZodiac(){
  var y=parseInt(document.getElementById('zodiac-year').value);
  var el=document.getElementById('zodiac-result');
  if(!y){show(el,'<span style="color:#f88">请输入年份</span>');return}
  var sx=['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];
  var tg=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  var dz=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  var sxv=sx[y%12];
  var idx=(y-1984)%60;if(idx<0)idx+=60;
  var gzv=tg[idx%10]+dz[idx%12];
  show(el,'<span class="value" style="font-size:1.2em">'+sxv+'</span>年　干支：<span class="value">'+gzv+'</span>');
}

var TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
function ganZhi(y){var idx=(y-1984)%60;if(idx<0)idx+=60;return TG[idx%10]+DZ[idx%12]}
function calcEra(type){
  var el=document.getElementById('nian-result');
  var gong=document.getElementById('era-gong'),min=document.getElementById('era-min'),gz=document.getElementById('era-ganzhi');
  if(type==='gong'&&gong.value){var y=parseInt(gong.value);if(!y)return;min.value=y-1911;gz.value=ganZhi(y)}
  else if(type==='min'&&min.value){var y=parseInt(min.value)+1911;gong.value=y;gz.value=ganZhi(y)}
  else if(type==='gz'&&gz.value){var s=gz.value.trim();for(var y=1900;y<=2030;y++){if(ganZhi(y)===s){gong.value=y;min.value=y-1911;break}}}
  if(gong.value)show(el,'公元<span class="value">'+gong.value+'</span>年 = 民国<span class="value">'+(parseInt(gong.value)-1911)+'</span>年 = <span class="value">'+ganZhi(parseInt(gong.value))+'</span>年')
}

function calcSurname(){
  var s=document.getElementById('surname-input').value.trim();
  var el=document.getElementById('surname-result');
  if(!s){show(el,'<span style="color:#f88">请输入姓氏</span>');return}
  var ranks='李王张刘陈杨赵黄周吴徐孙胡朱高林何郭马罗梁宋郑谢韩唐冯于董萧程曹袁邓许傅沈曾彭吕苏卢蒋蔡贾丁魏薛叶阎余潘杜戴夏钟汪田任姜范方石姚谭廖邹熊金陆郝孔白崔康毛邱秦江史顾侯邵孟龙万段雷钱汤尹黎易常武乔贺赖龚文'.split('');
  var idx=ranks.indexOf(s);
  if(idx>=0)show(el,'<span class="value" style="font-size:1.3em">'+s+'</span>姓在现代百家姓中排名第 <span class="value" style="color:#d4af37;font-size:1.3em">'+(idx+1)+'</span> 位');
  else show(el,'<span class="value">'+s+'</span>未进入前100名常见姓氏');
}
