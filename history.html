<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史文化 — 问渠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}
header{padding:30px 0 20px;text-align:center}
.nav-back{display:inline-flex;align-items:center;gap:6px;color:#d4af37;text-decoration:none;font-size:.9rem;padding:8px 16px;border:1px solid rgba(212,175,55,.3);border-radius:8px;transition:all .3s}
.nav-back:hover{background:rgba(212,175,55,.1)}
header h1{font-size:2rem;color:#d4af37;margin:15px 0 8px;letter-spacing:.1em}
header p{color:#888;font-size:.9rem}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding-bottom:40px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:12px;overflow:hidden}
.tool-header{width:100%;background:none;border:none;color:#e8e8e8;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:1rem;text-align:left;font-family:inherit}
.tool-header:hover{background:rgba(212,175,55,.06)}
.tool-header h3{color:#d4af37;font-size:1rem}
.tool-header .arrow{color:#d4af37;font-size:1.2rem;transition:transform .3s}
.tool-body{padding:0 20px 20px;display:none}
.tool-body.open{display:block}
.form-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
input,select{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
select{width:auto;min-width:120px}
.btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;width:100%;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
.result-box{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:16px;margin-top:12px;font-size:.9rem;line-height:1.8;display:none}
.result-box.show{display:block}
.result-box .label{color:#d4af37;font-weight:600}
.result-box .value{color:#fff}
.tip{color:#888;font-size:.8rem;margin-top:8px}
footer{text-align:center;padding:30px 0;color:#555;font-size:.8rem}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <header>
    <a href="index.html" class="nav-back">← 返回首页</a>
    <h1>🏛️ 历史文化</h1>
    <p>朝代更迭，岁月留痕</p>
  </header>
  <div class="tools-grid">

    <div class="tool-card" id="converter">
      <button class="tool-header" onclick="toggle(this)">
        <h3>🏛️ 朝代年份换算</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">输入公元年份，自动推算所属朝代、都城与皇帝年号</p>
        <div class="form-row">
          <input type="number" id="year-input" placeholder="输入公元年份（如：2026）" onkeydown="if(event.key==='Enter')calcYear()">
        </div>
        <button class="btn" onclick="calcYear()">查询</button>
        <div class="result-box" id="year-result"></div>
      </div>
    </div>

    <div class="tool-card" id="person-age">
      <button class="tool-header" onclick="toggle(this)">
        <h3>👤 历史人物年龄</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="birth-year" placeholder="生年（如：1898）">
          <input type="number" id="death-year" placeholder="卒年（如：1976）">
        </div>
        <button class="btn" onclick="calcAge()">计算</button>
        <div class="result-box" id="age-result"></div>
      </div>
    </div>

    <div class="tool-card" id="coin">
      <button class="tool-header" onclick="toggle(this)">
        <h3>💰 古代货币换算</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="coin-amount" placeholder="金额" onkeydown="if(event.key==='Enter')calcCoin()">
          <select id="coin-unit">
            <option value="wen">铜钱（文）</option>
            <option value="liang">两白银</option>
            <option value="guan">贯（1000文）</option>
          </select>
        </div>
        <button class="btn" onclick="calcCoin()">换算</button>
        <div class="result-box" id="coin-result"></div>
        <p class="tip">注：历史学家估算差异极大，此为参考中间值</p>
      </div>
    </div>

    <div class="tool-card" id="zodiac">
      <button class="tool-header" onclick="toggle(this)">
        <h3>🐉 生肖属相查询</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="zodiac-year" placeholder="年份（如：1990）" onkeydown="if(event.key==='Enter')calcZodiac()">
        </div>
        <button class="btn" onclick="calcZodiac()">查询</button>
        <div class="result-box" id="zodiac-result"></div>
      </div>
    </div>

    <div class="tool-card" id="era">
      <button class="tool-header" onclick="toggle(this)">
        <h3>📅 纪年对照</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">填任意一项，回车自动换算其他两项</p>
        <div class="form-row">
          <input type="number" id="era-gong" placeholder="公元年" oninput="calcEra('gong')">
          <input type="number" id="era-min" placeholder="民国年" oninput="calcEra('min')">
          <input type="text" id="era-ganzhi" placeholder="干支（如：甲子）" oninput="calcEra('gz')">
        </div>
        <div class="result-box" id="era-result"></div>
      </div>
    </div>

    <div class="tool-card" id="surname">
      <button class="tool-header" onclick="toggle(this)">
        <h3>📖 百家姓查询</h3>
        <span class="arrow">▼</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="text" id="surname-input" placeholder="输入姓氏（如：张）" onkeydown="if(event.key==='Enter')calcSurname()" maxlength="4">
        </div>
        <button class="btn" onclick="calcSurname()">查询</button>
        <div class="result-box" id="surname-result"></div>
      </div>
    </div>

  </div>
  <footer>© 2026 问渠 · 有问必有答</footer>
</div>
<script>
// 粒子背景
(function(){
  var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),particles=[],w,h;
  function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<80;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,alpha:Math.random()*0.5+0.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(212,175,55,${p.alpha})`;ctx.fill()}
    for(var i=0;i<particles.length;i++)for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(212,175,55,${0.06*(1-dist/150)})`;ctx.lineWidth=0.5;ctx.stroke()}}
    requestAnimationFrame(draw);
  }draw();
})();

function toggle(btn){var body=btn.nextElementSibling,arrow=btn.querySelector('.arrow');body.classList.toggle('open');arrow.textContent=body.classList.contains('open')?'▲':'▼'}
function show(el,html){el.innerHTML=html;el.classList.add('show')}

// 朝代数据
var DY=[{n:'夏',s:-2070,e:-1600,c:'斟鄩（洛阳）',hz:'禹',note:'公元前2070年禹建立'},
{n:'商',s:-1600,e:-1046,c:'殷（安阳）',hz:'汤'},
{n:'西周',s:-1046,e:-771,c:'镐京（西安）',hz:'武王'},
{n:'东周',s:-770,e:-256,c:'洛邑（洛阳）',hz:'平王',sub:[{n:'春秋',s:-770,e:-476},{n:'战国',s:-475,e:-221}]},
{n:'秦',s:-221,e:-207,c:'咸阳',hz:'始皇'},
{n:'西汉',s:-206,e:8,c:'长安',hz:'高祖'},
{n:'东汉',s:25,e:220,c:'洛阳',hz:'光武'},
{n:'三国',s:220,e:280,c:'魏/蜀/吴',hz:'魏文帝/昭烈帝/大帝'},
{n:'西晋',s:265,e:316,c:'洛阳',hz:'武帝'},
{n:'东晋',s:317,e:420,c:'建康（南京）',hz:'元帝'},
{n:'南北朝',s:420,e:589,c:'南北对峙',hz:'宋/齐/梁/陈/北魏等'},
{n:'隋',s:581,e:618,c:'长安',hz:'文帝'},
{n:'唐',s:618,e:907,c:'长安',hz:'高祖'},
{n:'五代十国',s:907,e:960,c:'中原更迭',hz:'后梁/后唐/后晋/后汉/后周'},
{n:'北宋',s:960,e:1127,c:'开封',hz:'太祖'},
{n:'南宋',s:1127,e:1279,c:'临安（杭州）',hz:'高宗'},
{n:'元',s:1271,e:1368,c:'大都（北京）',hz:'世祖'},
{n:'明',s:1368,e:1644,c:'北京',hz:'太祖'},
{n:'清',s:1644,e:1912,c:'北京',hz:'世祖'},
{n:'民国',s:1912,e:1949,c:'南京/北京',hz:'孙中山/蒋介石'}];

function calcYear(){
  var y=parseInt(document.getElementById('year-input').value);
  var el=document.getElementById('year-result');
  if(!y&&y!==0){show(el,'<span style="color:#f88">请输入有效年份</span>');return}
  var era='';
  if(y<0){era='公元前'+Math.abs(y)+'年';var d=DY.find(function(d){return y>=d.s&&y<d.e});if(d)era+=' → <span class="value">'+d.n+'</span>时期，都城：'+d.c;else era+='（先秦时期）'}
  else{
    var d=DY.find(function(d){return y>=d.s&&y<d.e});
    if(d){var nh='<span class="value">'+d.n+'</span>时期';if(d.hz)nh+='，皇帝：'+d.hz;nh+='，都城：'+d.c;era=nh}
    else if(y<25)era='王莽新朝（8-23）时期';
    else if(y>=1912)era='<span class="value">民国</span>时期，民国'+(y-1911)+'年';
    else era='未匹配到朝代';
  }
  show(el,era);
}

function calcAge(){
  var b=parseInt(document.getElementById('birth-year').value);
  var d=parseInt(document.getElementById('death-year').value);
  var el=document.getElementById('age-result');
  if(!b||!d){show(el,'<span style="color:#f88">请输入生年和卒年</span>');return}
  if(d<b){show(el,'<span style="color:#f88">卒年应大于生年</span>');return}
  var age=d-b;
  var sx=['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];
  var sxval=sx[b%12];
  var yrs=2026-d;
  show(el,'享年：<span class="value">'+age+'岁</span>　属相：<span class="value">'+sxval+'</span>　距今：<span class="value">'+yrs+'年</span>　生于'+b+'年，卒于'+d+'年');
}

function calcCoin(){
  var amt=parseFloat(document.getElementById('coin-amount').value);
  var unit=document.getElementById('coin-unit').value;
  var el=document.getElementById('coin-result');
  if(!amt&&amt!==0){show(el,'<span style="color:#f88">请输入金额</span>');return}
  var rates={wen:0.5,liang:200,guan:500};
  var labels={wen:'枚铜钱',liang:'两白银',guan:'贯铜钱'};
  var rmb=(amt*rates[unit]).toFixed(2);
  show(el,'<span class="value">'+amt+labels[unit]+'</span>≈ 约 <span class="value" style="color:#d4af37;font-size:1.1em">人民币 '+rmb+' 元</span><br><small style="color:#888">参考：唐宋1两≈500-1000元，清末1两≈50-100元，取中间值</small>');
}

function calcZodiac(){
  var y=parseInt(document.getElementById('zodiac-year').value);
  var el=document.getElementById('zodiac-result');
  if(!y){show(el,'<span style="color:#f88">请输入年份</span>');return}
  var sx=['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];
  var tg=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  var dz=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  var wx=['金','木','水','火','土'];
  var nayin=['海中金','炉中火','大林木','路旁土','剑锋金','山头火','涧下水','城头土','杨柳木','井泉水','屋上土','霹雳火','松柏木','白蜡金','金箔金','钗钏金','桑柘木','大驿土','天上火','石榴木','大海水'];
  var sxv=sx[y%12];
  var gzidx=(y-1984)%60;if(gzidx<0)gzidx+=60;
  var gzv=tg[gzidx%10]+dz[gzidx%12];
  var wyv=wx[(gzidx%10+gzidx%12)%5];
  var nay=nayin[gzidx%60];
  var colors={金:'白/银',木:'绿',水:'黑/蓝',火:'红/紫',土:'黄/棕'};
  var lucky={金:[4,9],木:[3,8],水:[1,6],火:[2,7],土:[5,10]};
  show(el,'<span class="value" style="font-size:1.2em">'+sxv+'</span>年　干支：<span class="value">'+gzv+'</span>　五行：<span class="value">'+wyv+'</span>　纳音：<span class="value">'+nay+'</span><br>幸运色：'+colors[wyv]+'　幸运数字：'+lucky[wyv].join('、'));
}

var TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
function ganZhi(y){
  var idx=(y-1984)%60;if(idx<0)idx+=60;
  return TG[idx%10]+DZ[idx%12];
}

function calcEra(type){
  var el=document.getElementById('era-result');
  var gong=document.getElementById('era-gong');
  var min=document.getElementById('era-min');
  var gz=document.getElementById('era-ganzhi');
  if(type==='gong'&&gong.value){
    var y=parseInt(gong.value);if(!y)return;
    min.value=y-1911;gz.value=ganZhi(y);
  }else if(type==='min'&&min.value){
    var y=parseInt(min.value)+1911;
    gong.value=y;gz.value=ganZhi(y);
  }else if(type==='gz'&&gz.value){
    var s=gz.value.trim();
    for(var y=1900;y<=2030;y++){if(ganZhi(y)===s){gong.value=y;min.value=y-1911;break}}
  }
  if(gong.value){show(el,'公元<span class="value">'+gong.value+'</span>年 = 民国<span class="value">'+(parseInt(gong.value)-1911)+'</span>年 = <span class="value">'+ganZhi(parseInt(gong.value))+'</span>年')}
}

function calcSurname(){
  var s=document.getElementById('surname-input').value.trim();
  var el=document.getElementById('surname-result');
  if(!s){show(el,'<span style="color:#f88">请输入姓氏</span>');return}
  var ranks='赵钱孙李周吴郑王冯陈褚卫蒋沈韩杨朱秦尤许何吕施张孔曹严华金魏陶姜戚谢邹喻柏水窦章云苏潘葛奚范彭郎鲁韦昌马苗凤花方俞任袁柳酆鲍史唐费廉岑薛雷贺倪汤滕殷罗毕郝邬安常乐于时傅皮卞齐康伍余元卜顾孟平黄和穆萧尹姚邵湛汪祁毛禹狄米贝明臧计伏成戴谈宋茅庞熊纪舒屈项祝董梁杜阮蓝闽席季麻强贾路娄危江童颜郭梅盛林刁钟徐邱骆高夏蔡田樊胡凌霍虞万支柯昝管卢莫经房裘缪干解应宗丁宣贲邓郁单杭洪包诸左石崔吉钮龚程嵇邢滑裴陆荣翁荀羊于惠甄麴家封芮羿储靳汲邴糜松井段富巫乌焦巴弓牧隗山谷车侯宓蓬全郗班仰秋仲伊宫宁仇栾暴甘钭厉戎祖武符刘景詹束龙叶幸司韶郜黎蓟薄印宿白怀蒲台从鄂索咸籍赖卓蔺屠蒙池乔阴郁胥能苍双闻莘党翟谭贡劳逄姬申扶堵冉宰郦雍却璩桑桂濮牛寿通边扈燕冀郏浦尚农温别庄晏柴瞿阎慕应亢枚卜顾孟平黄'.split('');
  var fu=['欧阳','司马','诸葛','东方','皇甫','上官','宇文','令狐','钟离','闾丘','司空','亓官','司寇','仉督','颛孙','端木','巫马','公西','漆雕','乐正','壤驷','公良','拓跋','夹谷','宰父','谷梁','晋楚','阎汝','鄢涂','钦','段干','百里','东郭','南门','呼延','归海','岳帅','缑亢','况后','有琴','商牟','佘佗','伯赏'];
  for(var f of fu){if(s===f){show(el,'<span class="value">'+s+'</span>是复姓，历史上多见于'+['魏晋南北朝时期','唐代','明清'][Math.abs(f.length+s.charCodeAt(0))%3]+'，排名不在前100常见单姓之中');return}}
  var idx=ranks.indexOf(s);
  if(idx>=0)show(el,'<span class="value" style="font-size:1.3em">'+s+'</span>姓在百家姓中排名第 <span class="value" style="color:#d4af37;font-size:1.3em">'+(idx+1)+'</span> 位');
  else show(el,'<span class="value">'+s+'</span>未进入前100名常见姓氏');
}

// 默认展开第一个
document.querySelector('.tool-body').classList.add('open');
document.querySelector('.tool-header .arrow').textContent='▲';
</script>
</body>
</html>
