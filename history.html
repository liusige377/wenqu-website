<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еҺҶеҸІж–ҮеҢ– вҖ” й—®жё </title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}
header{padding:30px 0 20px;text-align:center}
.nav-back{display:inline-flex;align-items:center;gap:6px;color:#d4af37;text-decoration:none;font-size:.9rem;padding:8px 16px;border:1px solid rgba(212,175,55,.3);border-radius:8px;transition:all .3s}
.nav-back:hover{background:rgba(212,175,55,.1)}
header h1{font-size:2rem;color:#d4af37;margin:15px 0 8px;letter-spacing:.1em}
header p{color:#888;font-size:.9rem}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding-bottom:40px}
.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:12px;overflow:hidden}
.tool-header{width:100%;background:none;border:none;color:#e8e8e8;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:1rem;text-align:left;font-family:inherit}
.tool-header:hover{background:rgba(212,175,55,.06)}
.tool-header h3{color:#d4af37;font-size:1rem}
.tool-header .arrow{color:#d4af37;font-size:1.2rem;transition:transform .3s}
.tool-body{padding:0 20px 20px;display:none}
.tool-body.open{display:block}
.form-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
input,select{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}
select{width:auto;min-width:120px}
.btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;width:100%;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
.result-box{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:16px;margin-top:12px;font-size:.9rem;line-height:1.8;display:none}
.result-box.show{display:block}
.result-box .label{color:#d4af37;font-weight:600}
.result-box .value{color:#fff}
.tip{color:#888;font-size:.8rem;margin-top:8px}
footer{text-align:center;padding:30px 0;color:#555;font-size:.8rem}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
  <header>
    <a href="index.html" class="nav-back">вҶҗ иҝ”еӣһйҰ–йЎө</a>
    <h1>рҹҸӣпёҸ еҺҶеҸІж–ҮеҢ–</h1>
    <p>жңқд»ЈжӣҙиҝӯпјҢеІҒжңҲз•ҷз—•</p>
  </header>
  <div class="tools-grid">

    <div class="tool-card" id="converter">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹҸӣпёҸ жңқд»Је№ҙд»ҪжҚўз®—</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">иҫ“е…Ҙе…¬е…ғе№ҙд»ҪпјҢиҮӘеҠЁжҺЁз®—жүҖеұһжңқд»ЈгҖҒйғҪеҹҺдёҺзҡҮеёқе№ҙеҸ·</p>
        <div class="form-row">
          <input type="number" id="year-input" placeholder="иҫ“е…Ҙе…¬е…ғе№ҙд»ҪпјҲеҰӮпјҡ2026пјү" onkeydown="if(event.key==='Enter')calcYear()">
        </div>
        <button class="btn" onclick="calcYear()">жҹҘиҜў</button>
        <div class="result-box" id="year-result"></div>
      </div>
    </div>

    <div class="tool-card" id="person-age">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹ‘Ө еҺҶеҸІдәәзү©е№ҙйҫ„</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="birth-year" placeholder="з”ҹе№ҙпјҲеҰӮпјҡ1898пјү">
          <input type="number" id="death-year" placeholder="еҚ’е№ҙпјҲеҰӮпјҡ1976пјү">
        </div>
        <button class="btn" onclick="calcAge()">и®Ўз®—</button>
        <div class="result-box" id="age-result"></div>
      </div>
    </div>

    <div class="tool-card" id="coin">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹ’° еҸӨд»Јиҙ§еёҒжҚўз®—</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="coin-amount" placeholder="йҮ‘йўқ" onkeydown="if(event.key==='Enter')calcCoin()">
          <select id="coin-unit">
            <option value="wen">й“ңй’ұпјҲж–Үпјү</option>
            <option value="liang">дёӨзҷҪй“¶</option>
            <option value="guan">иҙҜпјҲ1000ж–Үпјү</option>
          </select>
        </div>
        <button class="btn" onclick="calcCoin()">жҚўз®—</button>
        <div class="result-box" id="coin-result"></div>
        <p class="tip">жіЁпјҡеҺҶеҸІеӯҰе®¶дј°з®—е·®ејӮжһҒеӨ§пјҢжӯӨдёәеҸӮиҖғдёӯй—ҙеҖј</p>
      </div>
    </div>

    <div class="tool-card" id="zodiac">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹҗү з”ҹиӮ–еұһзӣёжҹҘиҜў</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="number" id="zodiac-year" placeholder="е№ҙд»ҪпјҲеҰӮпјҡ1990пјү" onkeydown="if(event.key==='Enter')calcZodiac()">
        </div>
        <button class="btn" onclick="calcZodiac()">жҹҘиҜў</button>
        <div class="result-box" id="zodiac-result"></div>
      </div>
    </div>

    <div class="tool-card" id="era">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹ“… зәӘе№ҙеҜ№з…§</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <p style="color:#888;font-size:.85rem;margin-bottom:10px">еЎ«д»»ж„ҸдёҖйЎ№пјҢеӣһиҪҰиҮӘеҠЁжҚўз®—е…¶д»–дёӨйЎ№</p>
        <div class="form-row">
          <input type="number" id="era-gong" placeholder="е…¬е…ғе№ҙ" oninput="calcEra('gong')">
          <input type="number" id="era-min" placeholder="ж°‘еӣҪе№ҙ" oninput="calcEra('min')">
          <input type="text" id="era-ganzhi" placeholder="е№Іж”ҜпјҲеҰӮпјҡз”Іеӯҗпјү" oninput="calcEra('gz')">
        </div>
        <div class="result-box" id="era-result"></div>
      </div>
    </div>

    <div class="tool-card" id="surname">
      <button class="tool-header" onclick="toggle(this)">
        <h3>рҹ“– зҷҫе®¶е§“жҹҘиҜў</h3>
        <span class="arrow">в–ј</span>
      </button>
      <div class="tool-body">
        <div class="form-row">
          <input type="text" id="surname-input" placeholder="иҫ“е…Ҙе§“ж°ҸпјҲеҰӮпјҡеј пјү" onkeydown="if(event.key==='Enter')calcSurname()" maxlength="4">
        </div>
        <button class="btn" onclick="calcSurname()">жҹҘиҜў</button>
        <div class="result-box" id="surname-result"></div>
      </div>
    </div>

  </div>
  <footer>В© 2026 й—®жё  В· жңүй—®еҝ…жңүзӯ”</footer>
</div>
<script>
// зІ’еӯҗиғҢжҷҜ
(function(){
  var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),particles=[],w,h;
  function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<80;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,alpha:Math.random()*0.5+0.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(212,175,55,${p.alpha})`;ctx.fill()}
    for(var i=0;i<particles.length;i++)for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(212,175,55,${0.06*(1-dist/150)})`;ctx.lineWidth=0.5;ctx.stroke()}}
    requestAnimationFrame(draw);
  }draw();
})();

function toggle(btn){var body=btn.nextElementSibling,arrow=btn.querySelector('.arrow');body.classList.toggle('open');arrow.textContent=body.classList.contains('open')?'в–І':'в–ј'}
function show(el,html){el.innerHTML=html;el.classList.add('show')}

// жңқд»Јж•°жҚ®
var DY=[{n:'еӨҸ',s:-2070,e:-1600,c:'ж–ҹй„©пјҲжҙӣйҳіпјү',hz:'зҰ№',note:'е…¬е…ғеүҚ2070е№ҙзҰ№е»әз«Ӣ'},
{n:'е•Ҷ',s:-1600,e:-1046,c:'ж®·пјҲе®үйҳіпјү',hz:'жұӨ'},
{n:'иҘҝе‘Ё',s:-1046,e:-771,c:'й•җдә¬пјҲиҘҝе®үпјү',hz:'жӯҰзҺӢ'},
{n:'дёңе‘Ё',s:-770,e:-256,c:'жҙӣйӮ‘пјҲжҙӣйҳіпјү',hz:'е№ізҺӢ',sub:[{n:'жҳҘз§Ӣ',s:-770,e:-476},{n:'жҲҳеӣҪ',s:-475,e:-221}]},
{n:'з§Ұ',s:-221,e:-207,c:'е’ёйҳі',hz:'е§ӢзҡҮ'},
{n:'иҘҝжұү',s:-206,e:8,c:'й•ҝе®ү',hz:'й«ҳзҘ–'},
{n:'дёңжұү',s:25,e:220,c:'жҙӣйҳі',hz:'е…үжӯҰ'},
{n:'дёүеӣҪ',s:220,e:280,c:'йӯҸ/иңҖ/еҗҙ',hz:'йӯҸж–Үеёқ/жҳӯзғҲеёқ/еӨ§еёқ'},
{n:'иҘҝжҷӢ',s:265,e:316,c:'жҙӣйҳі',hz:'жӯҰеёқ'},
{n:'дёңжҷӢ',s:317,e:420,c:'е»әеә·пјҲеҚ—дә¬пјү',hz:'е…ғеёқ'},
{n:'еҚ—еҢ—жңқ',s:420,e:589,c:'еҚ—еҢ—еҜ№еіҷ',hz:'е®Ӣ/йҪҗ/жўҒ/йҷҲ/еҢ—йӯҸзӯү'},
{n:'йҡӢ',s:581,e:618,c:'й•ҝе®ү',hz:'ж–Үеёқ'},
{n:'е”җ',s:618,e:907,c:'й•ҝе®ү',hz:'й«ҳзҘ–'},
{n:'дә”д»ЈеҚҒеӣҪ',s:907,e:960,c:'дёӯеҺҹжӣҙиҝӯ',hz:'еҗҺжўҒ/еҗҺе”җ/еҗҺжҷӢ/еҗҺжұү/еҗҺе‘Ё'},
{n:'еҢ—е®Ӣ',s:960,e:1127,c:'ејҖе°Ғ',hz:'еӨӘзҘ–'},
{n:'еҚ—е®Ӣ',s:1127,e:1279,c:'дёҙе®үпјҲжқӯе·һпјү',hz:'й«ҳе®—'},
{n:'е…ғ',s:1271,e:1368,c:'еӨ§йғҪпјҲеҢ—дә¬пјү',hz:'дё–зҘ–'},
{n:'жҳҺ',s:1368,e:1644,c:'еҢ—дә¬',hz:'еӨӘзҘ–'},
{n:'жё…',s:1644,e:1912,c:'еҢ—дә¬',hz:'дё–зҘ–'},
{n:'ж°‘еӣҪ',s:1912,e:1949,c:'еҚ—дә¬/еҢ—дә¬',hz:'еӯҷдёӯеұұ/и’Ӣд»Ӣзҹі'}];

function calcYear(){
  var y=parseInt(document.getElementById('year-input').value);
  var el=document.getElementById('year-result');
  if(!y&&y!==0){show(el,'<span style="color:#f88">иҜ·иҫ“е…Ҙжңүж•Ҳе№ҙд»Ҫ</span>');return}
  var era='';
  if(y<0){era='е…¬е…ғеүҚ'+Math.abs(y)+'е№ҙ';var d=DY.find(function(d){return y>=d.s&&y<d.e});if(d)era+=' вҶ’ <span class="value">'+d.n+'</span>ж—¶жңҹпјҢйғҪеҹҺпјҡ'+d.c;else era+='пјҲе…Ҳз§Ұж—¶жңҹпјү'}
  else{
    var d=DY.find(function(d){return y>=d.s&&y<d.e});
    if(d){var nh='<span class="value">'+d.n+'</span>ж—¶жңҹ';if(d.hz)nh+='пјҢзҡҮеёқпјҡ'+d.hz;nh+='пјҢйғҪеҹҺпјҡ'+d.c;era=nh}
    else if(y<25)era='зҺӢиҺҪж–°жңқпјҲ8-23пјүж—¶жңҹ';
    else if(y>=1912)era='<span class="value">ж°‘еӣҪ</span>ж—¶жңҹпјҢж°‘еӣҪ'+(y-1911)+'е№ҙ';
    else era='жңӘеҢ№й…ҚеҲ°жңқд»Ј';
  }
  show(el,era);
}

function calcAge(){
  var b=parseInt(document.getElementById('birth-year').value);
  var d=parseInt(document.getElementById('death-year').value);
  var el=document.getElementById('age-result');
  if(!b||!d){show(el,'<span style="color:#f88">иҜ·иҫ“е…Ҙз”ҹе№ҙе’ҢеҚ’е№ҙ</span>');return}
  if(d<b){show(el,'<span style="color:#f88">еҚ’е№ҙеә”еӨ§дәҺз”ҹе№ҙ</span>');return}
  var age=d-b;
  var sx=['зҢҙ','йёЎ','зӢ—','зҢӘ','йј ','зүӣ','иҷҺ','е…”','йҫҷ','иӣҮ','й©¬','зҫҠ'];
  var sxval=sx[b%12];
  var yrs=2026-d;
  show(el,'дә«е№ҙпјҡ<span class="value">'+age+'еІҒ</span>гҖҖеұһзӣёпјҡ<span class="value">'+sxval+'</span>гҖҖи·қд»Ҡпјҡ<span class="value">'+yrs+'е№ҙ</span>гҖҖз”ҹдәҺ'+b+'е№ҙпјҢеҚ’дәҺ'+d+'е№ҙ');
}

function calcCoin(){
  var amt=parseFloat(document.getElementById('coin-amount').value);
  var unit=document.getElementById('coin-unit').value;
  var el=document.getElementById('coin-result');
  if(!amt&&amt!==0){show(el,'<span style="color:#f88">иҜ·иҫ“е…ҘйҮ‘йўқ</span>');return}
  var rates={wen:0.5,liang:200,guan:500};
  var labels={wen:'жһҡй“ңй’ұ',liang:'дёӨзҷҪй“¶',guan:'иҙҜй“ңй’ұ'};
  var rmb=(amt*rates[unit]).toFixed(2);
  show(el,'<span class="value">'+amt+labels[unit]+'</span>вүҲ зәҰ <span class="value" style="color:#d4af37;font-size:1.1em">дәәж°‘еёҒ '+rmb+' е…ғ</span><br><small style="color:#888">еҸӮиҖғпјҡе”җе®Ӣ1дёӨвүҲ500-1000е…ғпјҢжё…жң«1дёӨвүҲ50-100е…ғпјҢеҸ–дёӯй—ҙеҖј</small>');
}

function calcZodiac(){
  var y=parseInt(document.getElementById('zodiac-year').value);
  var el=document.getElementById('zodiac-result');
  if(!y){show(el,'<span style="color:#f88">иҜ·иҫ“е…Ҙе№ҙд»Ҫ</span>');return}
  var sx=['зҢҙ','йёЎ','зӢ—','зҢӘ','йј ','зүӣ','иҷҺ','е…”','йҫҷ','иӣҮ','й©¬','зҫҠ'];
  var tg=['з”І','д№ҷ','дёҷ','дёҒ','жҲҠ','е·ұ','еәҡ','иҫӣ','еЈ¬','зҷё'];
  var dz=['еӯҗ','дё‘','еҜ…','еҚҜ','иҫ°','е·і','еҚҲ','жңӘ','з”і','й…ү','жҲҢ','дәҘ'];
  var wx=['йҮ‘','жңЁ','ж°ҙ','зҒ«','еңҹ'];
  var nayin=['жө·дёӯйҮ‘','зӮүдёӯзҒ«','еӨ§жһ—жңЁ','и·Ҝж—Ғеңҹ','еү‘й”ӢйҮ‘','еұұеӨҙзҒ«','ж¶§дёӢж°ҙ','еҹҺеӨҙеңҹ','жқЁжҹіжңЁ','дә•жіүж°ҙ','еұӢдёҠеңҹ','йң№йӣізҒ«','жқҫжҹҸжңЁ','зҷҪиңЎйҮ‘','йҮ‘з®”йҮ‘','й’—й’ҸйҮ‘','жЎ‘жҹҳжңЁ','еӨ§й©ҝеңҹ','еӨ©дёҠзҒ«','зҹіжҰҙжңЁ','еӨ§жө·ж°ҙ'];
  var sxv=sx[y%12];
  var gzidx=(y-1984)%60;if(gzidx<0)gzidx+=60;
  var gzv=tg[gzidx%10]+dz[gzidx%12];
  var wyv=wx[(gzidx%10+gzidx%12)%5];
  var nay=nayin[gzidx%60];
  var colors={йҮ‘:'зҷҪ/й“¶',жңЁ:'з»ҝ',ж°ҙ:'й»‘/и“қ',зҒ«:'зәў/зҙ«',еңҹ:'й»„/жЈ•'};
  var lucky={йҮ‘:[4,9],жңЁ:[3,8],ж°ҙ:[1,6],зҒ«:[2,7],еңҹ:[5,10]};
  show(el,'<span class="value" style="font-size:1.2em">'+sxv+'</span>е№ҙгҖҖе№Іж”Ҝпјҡ<span class="value">'+gzv+'</span>гҖҖдә”иЎҢпјҡ<span class="value">'+wyv+'</span>гҖҖзәійҹіпјҡ<span class="value">'+nay+'</span><br>е№ёиҝҗиүІпјҡ'+colors[wyv]+'гҖҖе№ёиҝҗж•°еӯ—пјҡ'+lucky[wyv].join('гҖҒ'));
}

var TG=['з”І','д№ҷ','дёҷ','дёҒ','жҲҠ','е·ұ','еәҡ','иҫӣ','еЈ¬','зҷё'];
var DZ=['еӯҗ','дё‘','еҜ…','еҚҜ','иҫ°','е·і','еҚҲ','жңӘ','з”і','й…ү','жҲҢ','дәҘ'];
function ganZhi(y){
  var idx=(y-1984)%60;if(idx<0)idx+=60;
  return TG[idx%10]+DZ[idx%12];
}

function calcEra(type){
  var el=document.getElementById('era-result');
  var gong=document.getElementById('era-gong');
  var min=document.getElementById('era-min');
  var gz=document.getElementById('era-ganzhi');
  if(type==='gong'&&gong.value){
    var y=parseInt(gong.value);if(!y)return;
    min.value=y-1911;gz.value=ganZhi(y);
  }else if(type==='min'&&min.value){
    var y=parseInt(min.value)+1911;
    gong.value=y;gz.value=ganZhi(y);
  }else if(type==='gz'&&gz.value){
    var s=gz.value.trim();
    for(var y=1900;y<=2030;y++){if(ganZhi(y)===s){gong.value=y;min.value=y-1911;break}}
  }
  if(gong.value){show(el,'е…¬е…ғ<span class="value">'+gong.value+'</span>е№ҙ = ж°‘еӣҪ<span class="value">'+(parseInt(gong.value)-1911)+'</span>е№ҙ = <span class="value">'+ganZhi(parseInt(gong.value))+'</span>е№ҙ')}
}
