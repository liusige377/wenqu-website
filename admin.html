<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问渠管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a12; color: #e0e0e0; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #1a1a2e, #2d1f4e); padding: 20px 24px; border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; color: #7c5cfc; }
        .header h1 span { color: #ff6b6b; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .login-box { max-width: 400px; margin: 100px auto; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 40px; text-align: center; }
        .login-box h2 { margin-bottom: 24px; color: #7c5cfc; }
        .login-box input { width: 100%; padding: 14px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; color: #e0e0e0; font-size: 16px; margin-bottom: 16px; outline: none; }
        .login-box input:focus { border-color: #7c5cfc; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; transition: all .2s; }
        .btn-primary { background: #7c5cfc; color: #fff; width: 100%; }
        .btn-primary:hover { background: #6a4ae8; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-success { background: #2ed573; color: #fff; }
        .btn-danger { background: #ff4757; color: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; text-align: center; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #7c5cfc; margin-bottom: 8px; }
        .stat-card .label { color: #888; font-size: 14px; }
        .stat-card.revenue .number { color: #2ed573; }
        .stat-card.usage .number { color: #ff6b6b; }
        
        .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .card h3 { color: #7c5cfc; margin-bottom: 16px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #2a2a4a; padding-bottom: 12px; }
        .tab { padding: 10px 20px; background: transparent; border: none; color: #888; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .tab.active { background: #7c5cfc; color: #fff; }
        .tab:hover:not(.active) { background: #2a2a4a; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a4a; }
        th { color: #7c5cfc; font-weight: 600; }
        tr:hover { background: #0f0f1a; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-vip { background: linear-gradient(135deg, #7c5cfc, #5a3fd4); color: #fff; }
        .badge-free { background: #2a2a4a; color: #888; }
        .badge-active { background: #2ed573; color: #0a0a12; }
        .badge-inactive { background: #ff4757; color: #fff; }
        
        .key-text { font-family: 'Courier New', monospace; font-size: 12px; color: #7c5cfc; word-break: break-all; }
        .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 32px; width: 90%; max-width: 400px; }
        .modal h3 { color: #7c5cfc; margin-bottom: 20px; }
        .modal input { width: 100%; padding: 12px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; margin-bottom: 16px; outline: none; }
        .modal .btn-group { display: flex; gap: 12px; }
        .modal .btn-group .btn { flex: 1; }
        
        .toast { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 10px; color: #fff; font-size: 14px; z-index: 999; display: none; animation: slideIn 0.3s ease; }
        .toast.show { display: block; }
        .toast.success { background: #2ed573; }
        .toast.error { background: #ff4757; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .empty { text-align: center; padding: 40px; color: #666; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 12px; }
            th, td { padding: 8px; }
            .truncate { max-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>问渠 <span>管理后台</span></h1>
        <button class="btn btn-sm btn-danger" id="logoutBtn" onclick="logout()" style="display:none;">退出</button>
    </div>

    <!-- 登录 -->
    <div class="container" id="loginPage">
        <div class="login-box">
            <h2>🔐 管理员登录</h2>
            <input type="password" id="adminKey" placeholder="输入管理员密钥">
            <button class="btn btn-primary" onclick="doLogin()">登录</button>
        </div>
    </div>

    <!-- 管理面板 -->
    <div class="container hidden" id="dashboard">
        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="number">-</div><div class="label">总用户</div></div>
            <div class="stat-card"><div class="number">-</div><div class="label">API Keys</div></div>
            <div class="stat-card usage"><div class="number">-</div><div class="label">今日调用</div></div>
            <div class="stat-card revenue"><div class="number">-</div><div class="label">总收入(元)</div></div>
        </div>

        <!-- 标签页 -->
        <div class="tab-bar">
            <button class="tab active" onclick="switchTab('users')">👥 用户管理</button>
            <button class="tab" onclick="switchTab('keys')">🔑 API Keys</button>
            <button class="tab" onclick="switchTab('models')">🤖 模型状态</button>
        </div>

        <!-- 用户列表 -->
        <div class="card" id="usersTab">
            <h3>用户列表 <button class="btn btn-sm btn-primary" onclick="loadUsers()">刷新</button></h3>
            <div id="usersTable"><div class="loading">加载中...</div></div>
        </div>

        <!-- Keys列表 -->
        <div class="card hidden" id="keysTab">
            <h3>API Keys <button class="btn btn-sm btn-primary" onclick="loadKeys()">刷新</button></h3>
            <div id="keysTable"><div class="loading">加载中...</div></div>
        </div>

        <!-- 模型状态 -->
        <div class="card hidden" id="modelsTab">
            <h3>模型状态 <button class="btn btn-sm btn-primary" onclick="loadModels()">刷新</button></h3>
            <div id="modelsList"><div class="loading">加载中...</div></div>
        </div>
    </div>

    <!-- 充值弹窗 -->
    <div class="modal-overlay" id="rechargeModal">
        <div class="modal">
            <h3>💰 用户充值</h3>
            <p id="rechargeUserInfo" style="color:#888;margin-bottom:16px;font-size:14px;"></p>
            <input type="number" id="rechargeAmount" placeholder="充值金额（元）" min="1">
            <input type="text" id="rechargeReason" placeholder="充值原因（可选）" value="管理员充值">
            <div class="btn-group">
                <button class="btn" onclick="closeModal()" style="background:#2a2a4a;color:#fff;">取消</button>
                <button class="btn btn-success" onclick="doRecharge()">确认充值</button>
            </div>
        </div>
    </div>

    <!-- VIP弹窗 -->
    <div class="modal-overlay" id="vipModal">
        <div class="modal">
            <h3>👑 设置VIP</h3>
            <p id="vipUserInfo" style="color:#888;margin-bottom:16px;font-size:14px;"></p>
            <input type="number" id="vipDays" placeholder="VIP天数" min="1" value="30">
            <div class="btn-group">
                <button class="btn" onclick="closeModal()" style="background:#2a2a4a;color:#fff;">取消</button>
                <button class="btn btn-primary" onclick="doSetVip()">确认设置</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://101.133.136.55:3000';
        let adminKey = localStorage.getItem('wenqu_admin_key');
        let currentUserId = null;

        // 页面加载
        if (adminKey) {
            showDashboard();
        }

        function doLogin() {
            adminKey = document.getElementById('adminKey').value.trim();
            if (!adminKey) return showToast('请输入管理员密钥', 'error');
            
            // 验证密钥
            fetch(`${API_BASE}/v1/admin/stats`, {
                headers: { 'Authorization': `Bearer ${adminKey}` }
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error.message);
                localStorage.setItem('wenqu_admin_key', adminKey);
                showDashboard();
                showToast('登录成功', 'success');
            })
            .catch(e => showToast('密钥错误: ' + e.message, 'error'));
        }

        function logout() {
            localStorage.removeItem('wenqu_admin_key');
            adminKey = null;
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('logoutBtn').style.display = 'block';
            loadStats();
            loadUsers();
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 加载统计
        function loadStats() {
            fetch(`${API_BASE}/v1/admin/stats`, {
                headers: { 'Authorization': `Bearer ${adminKey}` }
            })
            .then(r => r.json())
            .then(data => {
                const cards = document.getElementById('statsGrid').children;
                cards[0].querySelector('.number').textContent = data.users?.total || 0;
                cards[1].querySelector('.number').textContent = data.keys?.total || 0;
                cards[2].querySelector('.number').textContent = data.usage?.today || 0;
                cards[3].querySelector('.number').textContent = '¥' + (data.revenue?.total || 0);
            })
            .catch(e => showToast('加载统计失败', 'error'));
        }

        // 加载用户
        function loadUsers() {
            fetch(`${API_BASE}/v1/admin/users`, {
                headers: { 'Authorization': `Bearer ${adminKey}` }
            })
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('usersTable');
                if (!data.users?.length) {
                    container.innerHTML = '<div class="empty">暂无用户</div>';
                    return;
                }
                
                const isVip = u => u.vipExpiryDate && new Date(u.vipExpiryDate) > new Date();
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>邮箱</th><th>姓名</th><th>余额</th><th>VIP</th><th>注册时间</th><th>操作</th></tr>
                        </thead>
                        <tbody>
                            ${data.users.map(u => `
                                <tr>
                                    <td class="truncate" title="${u.email}">${u.email}</td>
                                    <td>${u.name || '-'}</td>
                                    <td>¥${u.balance || 0}</td>
                                    <td><span class="badge ${isVip(u) ? 'badge-vip' : 'badge-free'}">${isVip(u) ? 'VIP' : '免费'}</span></td>
                                    <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                                    <td>
                                        <button class="btn btn-sm btn-success" onclick="openRecharge('${u._id}', '${u.email}')">充值</button>
                                        <button class="btn btn-sm btn-primary" onclick="openVip('${u._id}', '${u.email}')">VIP</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            })
            .catch(e => {
                document.getElementById('usersTable').innerHTML = '<div class="empty">加载失败</div>';
                showToast('加载用户失败', 'error');
            });
        }

        // 加载Keys
        function loadKeys() {
            fetch(`${API_BASE}/v1/admin/keys`, {
                headers: { 'Authorization': `Bearer ${adminKey}` }
            })
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('keysTable');
                if (!data.keys?.length) {
                    container.innerHTML = '<div class="empty">暂无Keys</div>';
                    return;
                }
                
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Key</th><th>用户ID</th><th>名称</th><th>状态</th><th>创建时间</th></tr>
                        </thead>
                        <tbody>
                            ${data.keys.map(k => `
                                <tr>
                                    <td class="key-text">${k.key}</td>
                                    <td class="truncate">${k.userId}</td>
                                    <td>${k.name || '-'}</td>
                                    <td><span class="badge ${k.active ? 'badge-active' : 'badge-inactive'}">${k.active ? '正常' : '禁用'}</span></td>
                                    <td>${new Date(k.createdAt).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            })
            .catch(e => {
                document.getElementById('keysTable').innerHTML = '<div class="empty">加载失败</div>';
                showToast('加载Keys失败', 'error');
            });
        }

        // 加载模型
        function loadModels() {
            fetch(`${API_BASE}/v1/models`)
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('modelsList');
                if (!data.data?.length) {
                    container.innerHTML = '<div class="empty">暂无模型</div>';
                    return;
                }
                
                const byType = {};
                data.data.forEach(m => {
                    const type = m.type || 'other';
                    if (!byType[type]) byType[type] = [];
                    byType[type].push(m);
                });
                
                container.innerHTML = Object.entries(byType).map(([type, models]) => `
                    <div style="margin-bottom:20px;">
                        <h4 style="color:#7c5cfc;margin-bottom:12px;text-transform:uppercase;">${type} (${models.length})</h4>
                        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">
                            ${models.map(m => `
                                <div style="background:#0f0f1a;padding:12px;border-radius:8px;border:1px solid #2a2a4a;">
                                    <div style="font-weight:600;font-size:13px;">${m.id}</div>
                                    <div style="font-size:12px;color:#888;margin-top:4px;">${m.description || '-'}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            })
            .catch(e => {
                document.getElementById('modelsList').innerHTML = '<div class="empty">加载失败</div>';
            });
        }

        // 标签切换
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('usersTab').classList.add('hidden');
            document.getElementById('keysTab').classList.add('hidden');
            document.getElementById('modelsTab').classList.add('hidden');
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            
            if (tab === 'keys' && document.getElementById('keysTable').textContent.includes('加载中')) loadKeys();
            if (tab === 'models' && document.getElementById('modelsList').textContent.includes('加载中')) loadModels();
        }

        // 充值弹窗
        function openRecharge(userId, email) {
            currentUserId = userId;
            document.getElementById('rechargeUserInfo').textContent = `用户: ${email}`;
            document.getElementById('rechargeAmount').value = '';
            document.getElementById('rechargeModal').classList.add('active');
        }

        function openVip(userId, email) {
            currentUserId = userId;
            document.getElementById('vipUserInfo').textContent = `用户: ${email}`;
            document.getElementById('vipModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('rechargeModal').classList.remove('active');
            document.getElementById('vipModal').classList.remove('active');
            currentUserId = null;
        }

        // 执行充值
        function doRecharge() {
            const amount = parseFloat(document.getElementById('rechargeAmount').value);
            const reason = document.getElementById('rechargeReason').value;
            if (!amount || amount <= 0) return showToast('请输入有效金额', 'error');
            
            fetch(`${API_BASE}/v1/admin/users/${currentUserId}/recharge`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${adminKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ amount, reason })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error.message);
                showToast(`充值成功！新余额: ¥${data.newBalance}`, 'success');
                closeModal();
                loadUsers();
                loadStats();
            })
            .catch(e => showToast('充值失败: ' + e.message, 'error'));
        }

        // 设置VIP
        function doSetVip() {
            const days = parseInt(document.getElementById('vipDays').value);
            if (!days || days <= 0) return showToast('请输入有效天数', 'error');
            
            fetch(`${API_BASE}/v1/admin/users/${currentUserId}/vip`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${adminKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ days })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error.message);
                showToast(`VIP设置成功！到期: ${new Date(data.vipExpiryDate).toLocaleDateString()}`, 'success');
                closeModal();
                loadUsers();
            })
            .catch(e => showToast('设置失败: ' + e.message, 'error'));
        }

        // 点击遮罩关闭弹窗
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) closeModal(); });
        });
    </script>
</body>
</html>
