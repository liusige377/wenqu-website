<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>生活综合 — 问渠</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,"中文宋体",sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh;overflow-x:hidden}canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}header{padding:30px 0 20px;text-align:center}.nav-back{display:inline-flex;align-items:center;gap:6px;color:#d4af37;text-decoration:none;font-size:.9rem;padding:8px 16px;border:1px solid rgba(212,175,55,.3);border-radius:8px}header h1{font-size:2rem;color:#d4af37;margin:15px 0 8px}header p{color:#888;font-size:.9rem}.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding-bottom:40px}.tool-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:12px;overflow:hidden}.tool-header{width:100%;background:none;border:none;color:#e8e8e8;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:1rem;text-align:left;font-family:inherit}.tool-header:hover{background:rgba(212,175,55,.06)}.tool-header h3{color:#d4af37;font-size:1rem}.tool-header .arrow{color:#d4af37;font-size:1.2rem}.tool-body{padding:0 20px 20px;display:none}.tool-body.open{display:block}.form-row{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;align-items:center}input,select{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);color:#e8e8e8;padding:8px 12px;border-radius:6px;font-size:.9rem;width:100%}input[type="number"]{flex:1;min-width:80px}select{width:auto;min-width:120px}.btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;width:100%;margin-top:8px}.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);color:#d4af37;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;width:auto}.result-box{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:14px;margin-top:10px;font-size:.85rem;line-height:2;display:none}.result-box.show{display:block}.result-box .item{border-bottom:1px solid rgba(212,175,55,.1);padding:4px 0}.result-box .item:last-child{border:none}.result-box .label{color:#aaa}.result-box .value{color:#fff;font-weight:500;margin-left:8px}.result-box .highlight{color:#d4af37;font-weight:700}.result-box .red{color:#f66}.rand-display{text-align:center;padding:20px;font-size:2.5rem;color:#d4af37;min-height:80px;display:flex;align-items:center;justify-content:center}.footer{text-align:center;padding:30px 0;color:#555;font-size:.8rem}</style></head><body><canvas id="bg"></canvas><div class="container"><header><a href="index.html" class="nav-back">&larr; 返回首页</a><h1>&#127968; 生活综合</h1><p>日常所需 &middot; 一站换全</p></header><div class="tools-grid"><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#129535; 个税计算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="number" id="tax-salary" placeholder="月薪(元)"></div><div class="form-row"><input type="number" id="tax-bonus" placeholder="年终奖(元，可填0)"></div><div class="form-row"><input type="number" id="tax-insurance" placeholder="三险一金扣除(元)"></div><button class="btn" onclick="calcTax()">计算</button><div class="result-box" id="tax-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#127973; 房贷商贷计算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="number" id="loan-amount" placeholder="贷款金额(万)" value="100"></div><div class="form-row"><input type="number" id="loan-years" placeholder="贷款期限(年)" value="30"></div><div class="form-row"><input type="number" id="loan-rate" placeholder="年利率(%)" value="4.3" step="0.01"></div><div class="form-row"><select id="loan-type"><option value="debx">等额本息</option><option value="debj">等额本金</option></select></div><button class="btn" onclick="calcLoan()">计算</button><div class="result-box" id="loan-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#127922; 随机决定器</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><p style="color:#888;font-size:.85rem;margin-bottom:10px">添加选项，点击开始</p><div id="rand-opts"></div><button class="btn" onclick="addOpt()" style="background:rgba(255,255,255,.1);color:#d4af37">+ 添加选项</button><button class="btn" onclick="startRand()" style="margin-top:8px">开始抽签</button><div class="rand-display" id="rand-display">?</div><div class="result-box" id="rand-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#128197; 日期计算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="date" id="date-start"></div><div class="form-row"><input type="date" id="date-end"></div><div class="form-row"><input type="number" id="date-add" placeholder="加减天数" value="7"></div><button class="btn" onclick="calcDate()">计算</button><div class="result-box" id="date-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#129534; 身份证查询</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="text" id="id-input" placeholder="输入18位身份证号" maxlength="18"></div><button class="btn" onclick="calcId()">查询</button><div class="result-box" id="id-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#129504; 亲戚关系计算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="text" id="kin-input" placeholder="称呼（如：舌舌的僔子）"></div><button class="btn" onclick="calcKin()">换算</button><div class="result-box" id="kin-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#128291; 数字大写转换</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="text" id="cap-input" placeholder="输入数字（如：12345.67）"></div><button class="btn" onclick="calcCap()">转换</button><div class="result-box" id="cap-result"></div></div></div><div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>&#9889; 违约金计算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="number" id="pen-lpr" placeholder="LPR利率(%)" value="3.85" step="0.01"></div><div class="form-row"><input type="number" id="pen-amount" placeholder="欠款金额(万)" value="10"></div><div class="form-row"><input type="number" id="pen-days" placeholder="遇期天数" value="30"></div><div class="form-row"><input type="number" id="pen-mult" placeholder="LPR倍率" value="1.5" step="0.1"></div><button class="btn" onclick="calcPenalty()">计算</button><div class="result-box" id="pen-result"></div><p style="color:#888;font-size:.8rem;margin-top:8px">民间借贷利率上限为4倍LPR</p></div></div></div>
    <div class="tool-card"><button class="tool-header" onclick="toggle(this)"><h3>💱 汇率换算</h3><span class="arrow">&#9660;</span></button><div class="tool-body"><div class="form-row"><input type="number" id="fx-amount" placeholder="金额" value="100"></div><div class="form-row"><select id="fx-from"><option value="CNY" selected>人民币 CNY</option><option value="USD">美元 USD</option><option value="EUR">欧元 EUR</option><option value="JPY">日元 JPY</option><option value="GBP">英镑 GBP</option><option value="HKD">港币 HKD</option><option value="KRW">韩元 KRW</option><option value="AUD">澳元 AUD</option><option value="CAD">加元 CAD</option><option value="CHF">瑞郎 CHF</option><option value="SGD">新加坡元 SGD</option></select><span style="color:#888">→</span><select id="fx-to"><option value="CNY">人民币 CNY</option><option value="USD" selected>美元 USD</option><option value="EUR">欧元 EUR</option><option value="JPY">日元 JPY</option><option value="GBP">英镑 GBP</option><option value="HKD">港币 HKD</option><option value="KRW">韩元 KRW</option><option value="AUD">澳元 AUD</option><option value="CAD">加元 CAD</option><option value="CHF">瑞郎 CHF</option><option value="SGD">新加坡元 SGD</option></select></div><button class="btn" onclick="calcFX()">换算</button><div class="result-box" id="fx-result"></div><p style="color:#888;font-size:.8rem;margin-top:8px">汇率仅供参考，实际以银行牌价为准</p></div></div>
<footer>&copy; 2026 问渠 &middot; 有问必有答</footer></div></body><script>(function(){var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),particles=[],w=canvas.width=window.innerWidth,h=canvas.height=window.innerHeight;for(var i=0;i<80;i++)particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,alpha:Math.random()*0.5+0.1});function draw(){ctx.clearRect(0,0,w,h);for(var p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(212,175,55,'+p.alpha+')';ctx.fill()}for(var i=0;i<particles.length;i++)for(var j=i+1;j<particles.length;j++){var dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(212,175,55,'+(0.06*(1-d/150))+')';ctx.lineWidth=0.5;ctx.stroke()}}requestAnimationFrame(draw)}draw();window.addEventListener('resize',function(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight})})();function toggle(btn){var b=btn.nextElementSibling,a=btn.querySelector('.arrow');b.classList.toggle('open');a.innerHTML=b.classList.contains('open')?'&#9650;':'&#9660;'}function show(el,html){el.innerHTML=html;el.classList.add('show')}function fmt(v){return v>=1e6?v.toLocaleString():(v>=1000?v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','):v.toFixed(2))}function calcTax(){var s=parseFloat(document.getElementById('tax-salary').value)||0,b=parseFloat(document.getElementById('tax-bonus').value)||0,ins=parseFloat(document.getElementById('tax-insurance').value)||0,el=document.getElementById('tax-result');if(!s){show(el,'\u8bf7\u8f93\u5165\u6708\u85aa');return}var tx=Math.max(0,s-5000-ins);var steps=[0,36000,144000,300000,420000,660000,960000,Infinity];var rates=[0,0.03,0.1,0.2,0.25,0.3,0.35,0.45];var deducts=[0,0,2520,16920,31920,52920,85920,181920];var ri=0;for(var i=0;i<steps.length-1;i++)if(tx>steps[i]&&tx<=steps[i+1]){ri=i+1;break}var mt=Math.max(0,tx*rates[ri]-deducts[ri]);var bt=b>0?b*0.2:0;show(el,'<div class=item><span class=label>\u7a0e\u524d\u6708\u85aa</span><span class=value>'+fmt(s)+' \u5143</span></div><div class=item><span class=label>\u5e94\u7eb3\u7a0e\u6240\u5f97\u989d</span><span class=value>'+tx+' \u5143</span></div><div class=item><span class=label>\u6708\u5ea6\u4e2a\u7a0e</span><span class=highlight>'+mt.toFixed(2)+' \u5143</span></div><div class=item><span class=label>\u5e74\u7ec8\u5956\u4e2a\u7a0e</span><span class=highlight>'+bt.toFixed(2)+' \u5143</span></div><div class=item><span class=label>\u7a0e\u540e\u6708\u85aa</span><span class=value>'+(s-mt-ins).toFixed(2)+' \u5143</span></div>');}function calcLoan(){var P=parseFloat(document.getElementById('loan-amount').value)*10000,years=parseInt(document.getElementById('loan-years').value)||30,ar=parseFloat(document.getElementById('loan-rate').value)/100,type=document.getElementById('loan-type').value,el=document.getElementById('loan-result');if(!P||!ar){show(el,'\u8bf7\u586b\u5199\u5168\u90e8\u5b57\u6bb5');return}var r=ar/12,n=years*12;if(type==='debx'){var pmt=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);var tot=pmt*n;show(el,'<div class=item><span class=label>\u6708\u4f9b\uff08\u7b49\u989d\u672c\u606f\uff09</span><span class=highlight>\u00a5'+fmt(pmt)+'</span></div><div class=item><span class=label>\u603b\u5229\u606f</span><span class=red>-\u00a5'+fmt(tot-P)+'</span></div><div class=item><span class=label>\u672c\u606f\u5408\u8ba1</span><span class=value>\u00a5'+fmt(tot)+'</span></div>');}else{var first=P/n+P*r,last=P/n,tot=0;for(var i=0;i<n;i++)tot+=P/n+P*(1-i/n)*r;show(el,'<div class=item><span class=label>\u9996\u6708\u4f9b\uff08\u7b49\u989d\u672c\u91d1\uff09</span><span class=highlight>\u00a5'+fmt(first)+'</span></div><div class=item><span class=label>\u672b\u6708\u4f9b</span><span class=value>\u00a5'+fmt(last)+'</span></div><div class=item><span class=label>\u603b\u5229\u606f</span><span class=red>-\u00a5'+fmt(tot-P)+'</span></div><div class=item><span class=label>\u672c\u606f\u5408\u8ba1</span><span class=value>\u00a5'+fmt(tot)+'</span></div>');}}function addOpt(){var div=document.getElementById('rand-opts');var id='ro'+Date.now();div.innerHTML+='<div class=form-row id='+id+'><input type=text placeholder=\u9009\u9879 style=flex:1><button class=btn-sm onclick=document.getElementById("'+id+'").remove()>x</button></div>';}function startRand(){var texts=[];document.querySelectorAll('#rand-opts input').forEach(function(inp){if(inp.value.trim())texts.push(inp.value.trim())});var el=document.getElementById('rand-result');if(texts.length<2){show(el,'\u8bf7\u81f3\u5c11\u6dfb\u52a02\u4e2a\u9009\u9879');return}var display=document.getElementById('rand-display');var c=0,iv=setInterval(function(){display.textContent=texts[Math.floor(Math.random()*texts.length)];c++;if(c>25){clearInterval(iv);display.textContent=texts[Math.floor(Math.random()*texts.length)];show(el,'\u4ece'+texts.length+'\u4e2a\u9009\u9879\u4e2d\u968f\u673a\u9009\u51fa');}},50);}function calcDate(){var s=document.getElementById('date-start').value,e=document.getElementById('date-end').value,add=parseInt(document.getElementById('date-add').value)||7,el=document.getElementById('date-result');var html='';if(s&&e){var sd=new Date(s),ed=new Date(e),diff=Math.round((ed-sd)/86400000),wk=Math.floor(Math.abs(diff)/7),wd=0,cur=new Date(Math.min(sd,ed)),end2=new Date(Math.max(sd,ed));while(cur<=end2){var d=cur.getDay();if(d!==0&&d!==6)wd++;cur.setDate(cur.getDate()+1)}html+='<div class=item><span class=label>\u95f4\u9694\u5929\u6570</span><span class=highlight>'+Math.abs(diff)+'\u5929</span></div><div class=item><span class=label>'+wk+'\u5468</span><span class=value>\u5de5\u4f5c\u65e5'+wd+'\u5929</span></div>';}if(s){var sd2=new Date(s);sd2.setDate(sd2.getDate()+add);html+='<div class=item><span class=label>'+s+'\u00b1'+add+'\u5929</span><span class=value>'+sd2.toISOString().slice(0,10)+'</span></div>';}if(html)show(el,html);}function calcId(){var id=document.getElementById('id-input').value.trim(),el=document.getElementById('id-result');if(id.length!==18){show(el,'\u8bf7\u8f93\u516518\u4f4d\u8eab\u4efd\u8bc1\u53f7');return}var provs={"11":"\u5317\u4eac","12":"\u5929\u6d25","13":"\u6cb3\u5317","14":"\u5c71\u897f","15":"\u5185\u8499\u53e4","21":"\u8fbd\u5b81","22":"\u5409\u6797","23":"\u9ed1\u9f99\u6c5f","31":"\u4e0a\u6d77","32":"\u6c5f\u82cf","33":"\u6d59\u6c5f","34":"\u5b89\u5fbd","35":"\u798f\u5efa","36":"\u6c5f\u897f","37":"\u5c71\u4e1c","41":"\u6cb3\u5357","42":"\u6e56\u5317","43":"\u6e56\u5357","44":"\u5e7f\u4e1c","45":"\u5e7f\u897f","46":"\u6d77\u5357","50":"\u91cd\u5e86","51":"\u56db\u5ddd","52":"\u8d35\u5dde","53":"\u4e91\u5357","54":"\u897f\u85cf","61":"\u9655\u897f","62":"\u7518\u8083","63":"\u9752\u6d77","64":"\u5b81\u590f","65":"\u65b0\u7586"};var sx=['\u9f20','\u725b','\u864e','\u5154','\u9f99','\u86c7','\u9a6c','\u7f8a','\u7334','\u9e21','\u72d7','\u732a'];var xz=[['\u767d\u7f8a\u5ea7',321,419],['\u91d1\u725b\u5ea7',420,520],['\u53cc\u5b50\u5ea7',521,621],['\u5de8\u87f9\u5ea7',622,722],['\u72ee\u5b50\u5ea7',723,822],['\u5904\u5973\u5ea7',823,922],['\u5929\u79e4\u5ea7',923,1023],['\u5929\u87f9\u5ea7',1024,1122],['\u5c04\u624b\u5ea7',1123,1221],['\u6469\u7faf\u5ea7',1222,119],['\u6c34\u74f6\u5ea7',120,218],['\u53cc\u9c7c\u5ea7',219,320]];var province=provs[id.slice(0,2)]||'\u672a\u77e5',birth=id.slice(6,10)+'-'+id.slice(10,12)+'-'+id.slice(12,14),gender=parseInt(id.slice(16,17))%2===0?'\u5973':'\u7537',birthYear=parseInt(id.slice(6,10)),age=2026-birthYear,sxv=sx[birthYear%12],m=parseInt(id.slice(10,12)),d=parseInt(id.slice(12,14)),md=m*100+d,xzv='\u672a\u77e5';for(var i=0;i<xz.length;i++){if(xz[i][0]==='\u6469\u7faf\u5ea7'){if(md>=xz[i][1]||md<=xz[i][2])xzv='\u6469\u7faf\u5ea7';}else if(md>=xz[i][1]&&md<=xz[i][2]){xzv=xz[i][0];break}}var cc='10X98765432',chk=parseInt(id.slice(0,17))
