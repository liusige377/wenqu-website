*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

body{
  font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;
  background:#0a0a0f;color:#e8e8e8;
  display:flex;flex-direction:column;
  height:100vh;
}

/* ===== TOP BAR ===== */
.topbar{
  height:60px;background:#111118;
  border-bottom:1px solid rgba(212,175,55,.2);
  display:flex;align-items:center;
  padding:0 20px;gap:0;
  flex-shrink:0;z-index:10;
}
.topbar-title{
  font-size:1.35rem;font-weight:900;
  color:#d4af37;letter-spacing:.2em;
  margin-right:20px;flex-shrink:0;
  text-shadow:0 0 20px rgba(212,175,55,.3);
}
.topbar-poem{
  color:#888;font-size:.82rem;
  border-left:1px solid rgba(212,175,55,.2);
  padding-left:20px;
  line-height:1.5;letter-spacing:.05em;
  margin-right:20px;flex-shrink:0;
}
.topbar-poem .hl{color:#d4af37}
.topbar-divider{width:1px;height:30px;background:rgba(212,175,55,.15);margin:0 20px;flex-shrink:0}
.topbar-today{
  display:flex;flex-direction:column;gap:2px;
  flex:1;min-width:0;
}
.topbar-today-label{
  font-size:.65rem;color:#555;letter-spacing:.1em;
}
.topbar-today-events{
  display:flex;gap:20px;overflow:hidden;
  align-items:center;
}
.today-item{
  display:flex;align-items:center;gap:6px;font-size:.78rem;
  white-space:nowrap;
}
.today-item .yr{color:#d4af37;font-weight:600}
.today-item .tx{color:#888}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-badge{background:rgba(46,180,100,.12);color:#2eb46e;font-size:.7rem;padding:3px 10px;border-radius:12px}

/* ===== MAIN LAYOUT ===== */
.layout{display:flex;flex:1;overflow:hidden}

/* ===== LEFT SIDEBAR ===== */
.sidebar{
  width:200px;flex-shrink:0;
  background:#0e0e16;
  border-right:1px solid rgba(212,175,55,.12);
  overflow-y:auto;padding:16px 0;
  display:flex;flex-direction:column;gap:4px;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(212,175,55,.2)}

.side-section{margin-bottom:8px}
.side-section-label{
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:#555;padding:8px 16px 4px;
}
.side-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;
  font-size:.85rem;color:#999;
  transition:all .2s;border-radius:0;
  text-decoration:none;border:none;background:none;width:100%;text-align:left;
}
.side-item:hover{background:rgba(212,175,55,.08);color:#d4af37}
.side-item.active{background:rgba(212,175,55,.12);color:#d4af37;border-left:2px solid #d4af37}
.side-item .emoji{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}

.side-divider{height:1px;background:rgba(212,175,55,.1);margin:8px 16px}

/* ===== CENTER AREA ===== */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#0a0a0f}

.chat-header{
  padding:14px 24px;border-bottom:1px solid rgba(212,175,55,.1);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.chat-header-title{font-size:.9rem;color:#d4af37;font-weight:600}
.chat-header-sub{color:#555;font-size:.75rem}

.messages{
  flex:1;overflow-y:auto;padding:20px 24px;
  display:flex;flex-direction:column;gap:16px;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(212,175,55,.2);border-radius:2px}

.msg{display:flex;gap:12px;max-width:80%;animation:fadeIn .3s ease}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:72%}
.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.msg.bot .msg-avatar{background:rgba(212,175,55,.2);color:#d4af37;border:1px solid rgba(212,175,55,.3)}
.msg.user .msg-avatar{background:rgba(80,120,200,.2);color:#8ab4f8;border:1px solid rgba(100,150,255,.3)}
.msg-bubble{padding:12px 16px;border-radius:14px;line-height:1.6;font-size:.9rem}
.msg.bot .msg-bubble{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.12);border-radius:4px 14px 14px 14px}
.msg.user .msg-bubble{background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.2);border-radius:14px 4px 14px 14px}
.msg.user .msg-bubble{color:#e8e0c0}
.msg-time{font-size:.68rem;color:#444;margin-top:4px;padding:0 4px}
.msg.user .msg-time{text-align:right}

.welcome-box{text-align:center;padding:40px 20px;animation:fadeIn .4s ease}
.welcome-title{font-size:2.5rem;color:#d4af37;font-family:'Noto Serif SC',serif;margin-bottom:10px}
.welcome-tip{color:#555;font-size:.82rem;margin-top:16px;line-height:2}
.welcome-tip div{display:flex;align-items:center;justify-content:center;gap:8px}
.tool-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:20px}
.tool-chip{
  background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);
  border-radius:20px;padding:6px 14px;font-size:.78rem;color:#aaa;
  cursor:pointer;transition:all .2s;
}
.tool-chip:hover{background:rgba(212,175,55,.2);color:#d4af37;border-color:rgba(212,175,55,.4)}

.input-area{
  padding:16px 24px 20px;
  border-top:1px solid rgba(212,175,55,.1);flex-shrink:0;
}
.input-hint{font-size:.72rem;color:#444;margin-bottom:8px}
.input-hint span{display:flex;align-items:center;gap:4px}
.input-hint .key{background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;font-size:.68rem}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row input{
  flex:1;background:rgba(255,255,255,.05);
  border:1px solid rgba(212,175,55,.2);
  border-radius:24px;padding:12px 18px;
  color:#e8e8e8;font-size:.9rem;outline:none;
  transition:border-color .3s;
}
.input-row input:focus{border-color:rgba(212,175,55,.5)}
.input-row input::placeholder{color:#555}
.send-btn{
  background:linear-gradient(135deg,#d4af37,#b8932a);

  color:#0a0a0f;font-weight:700;font-size:.88rem;
  cursor:pointer;transition:all .3s;flex-shrink:0;
}
.send-btn:hover{background:linear-gradient(135deg,#e8c44a,#d4af37);transform:scale(1.03)}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

.typing-row{
  display:none;align-items:center;gap:8px;padding:0 24px 10px;

.typing-label{color:#555;font-size:.75rem}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:#666;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}

/* ===== TOOL PANEL ===== */
.tool-panel{display:none;padding:24px;flex:1;overflow-y:auto}
.tool-panel.visible{display:block}
.tool-panel-header{font-size:1.1rem;color:#d4af37;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(212,175,55,.15)}
.tool-card{

  border-radius:14px;padding:20px;margin-bottom:12px;
  cursor:pointer;transition:all .3s;

.tool-card:hover{background:rgba(212,175,55,.08);border-color:rgba(212,175,55,.3);transform:translateY(-2px)}
.tool-card h3{color:#d4af37;font-size:.95rem;margin-bottom:6px}
.tool-card p{color:#777;font-size:.82rem;line-height:1.5}
.back-link{

  color:#666;font-size:.82rem;cursor:pointer;margin-bottom:16px;padding:6px 0;transition:color .2s;

.back-link:hover{color:#d4af37}

/* ===== RIGHT PANEL ===== */
.right-panel{
  width:20%;flex-shrink:0;
  background:#0c0c14;
  border-left:1px solid rgba(212,175,55,.08);
  overflow-y:auto;padding:20px 16px;

.right-panel::-webkit-scrollbar-thumb{background:rgba(212,175,55,.15)}

.right-placeholder-text{color:#444;font-size:.78rem;text-align:center;line-height:1.6}
.right-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.1);

.right-card-title{font-size:.8rem;color:#d4af37;margin-bottom:6px}
.right-card-val{font-size:1.4rem;color:#e8e8e8;font-weight:600}
.right-card-sub{font-size:.7rem;color:#555;margin-top:2px}

/* ===== LOGIN BUTTON ===== */
.login-btn{

  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);

.login-btn:hover{background:rgba(212,175,55,.18);border-color:rgba(212,175,55,.4)}
.login-btn .emoji{font-size:1rem}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){

@media(max-width:700px){
  .sidebar{width:60px}
  .side-item .label,.side-section-label,.topbar-poem,.topbar-today{display:none}

@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

// ===== TODAY IN HISTORY (TOP BAR) =====
(function(){
  var now=new Date(),m=now.getMonth()+1,d=now.getDate();
  var sec=['零','一','二','三','四','五','六','七','八','九','十'],toC=function(n){if(n<10)return sec[n];if(n<20)return'十'+sec[n-10];if(n<100)return sec[Math.floor(n/10)]+'十'+sec[n%10];return String(n)};
  document.querySelector('.topbar-today-label').textContent='📅 历史上的今天 · '+now.getFullYear()+'年'+toC(m)+'月'+toC(d)+'日';

  var el=document.getElementById('topbar-today-events');
  function render(arr){
    if(!arr||arr.length===0){el.innerHTML='<div style="color:#555;font-size:.78rem">暂无记录</div>';return}
    arr.slice(0,3).forEach(function(ev){
      var div=document.createElement('div');div.className='today-item';
      div.innerHTML='<span class=yr>'+ev.year+'</span><span class=tx>'+(ev.text||ev.title||'').slice(0,20)+'</span>';
      el.appendChild(div);
    });
  }
  // Try today-api
  fetch('https://today.api.get996.top/api/today?m='+m+'&d='+d).then(function(r){return r.json()}).then(function(d2){
    if(d2.data&&d2.data.length>0)render(d2.data);else throw new Error('no data');
  }).catch(function(){
    fetch('https://api.youradi.cn/todayinhistory?m='+m+'&d='+d).then(function(r){return r.json()}).then(function(d3){
      render((d3.events||[]).slice(0,3));
    }).catch(function(){
      el.innerHTML='<div style="color:#555;font-size:.78rem">暂无记录</div>';
    });
  });
})();

// ===== NAVIGATION =====
function setActive(name){
  document.querySelectorAll('.side-item').forEach(function(el){el.classList.remove('active')});
}
function showChat(){
  document.getElementById('chat-view').style.display='flex';
  document.getElementById('tool-panel').classList.remove('visible');
  document.querySelectorAll('.side-item').forEach(function(el){el.classList.remove('active')});
  var items=document.querySelectorAll('.side-item');
  if(items[0])items[0].classList.add('active');
  document.getElementById('msg-input').focus();
}
function showTool(name){
  var data=TOOLS[name];if(!data)return;
  document.getElementById('chat-view').style.display='none';
  document.getElementById('tool-panel').classList.add('visible');
  document.getElementById('tool-panel-title').textContent=data.label;
  var list=document.getElementById('tool-list');
  list.innerHTML='';
  data.cards.forEach(function(card){
    var a=document.createElement('a');a.className='tool-card';
    a.href='javascript:void(0)';
    a.onclick=function(){window.open(card.url)};
    a.innerHTML='<h3>'+card.title+'</h3><p>'+card.desc+'</p>';
    list.appendChild(a);
  });
  setActive(name);
}
function sendQuick(q){showChat();document.getElementById('msg-input').value=q;sendMsg()}

// ===== AI CHAT =====
var API='https://1423198240-0conai1m1r.ap-guangzhou.tencentscf.com/chat';
var msgsEl=document.getElementById('messages');
var inputEl=document.getElementById('msg-input');
var sendBtn=document.getElementById('send-btn');
var typingEl=document.getElementById('typing-row');

function now(){
  var d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function addMsg(text,type){
  var wb=document.querySelector('.welcome-box');
  if(wb)wb.remove();
  var div=document.createElement('div');div.className='msg '+type;
  var safe=text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  div.innerHTML='<div class=msg-avatar>'+(type==='bot'?'🤖':'你')+'</div><div><div class=msg-bubble>'+safe+'</div><div class=msg-time>'+now()+'</div></div>';
  msgsEl.appendChild(div);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function sendMsg(){
  var q=inputEl.value.trim();if(!q)return;
  inputEl.value='';addMsg(q,'user');sendBtn.disabled=true;typingEl.style.display='flex';msgsEl.scrollTop=msgsEl.scrollHeight;
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json; charset=utf-8'},body:JSON.stringify({message:q})})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})
  .then(function(d){typingEl.style.display='none';sendBtn.disabled=false;addMsg(d.reply||'（无回复）','bot')})
  .catch(function(e){typingEl.style.display='none';sendBtn.disabled=false;addMsg('网络错误（'+e.message+'），请稍后重试','bot')});
}

inputEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
</script>
