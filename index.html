<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问渠AI - wenquso.cn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0e8;--sidebar:#2c1810;--accent:#c9a96e;--text:#3d2b1f;--chat-bg:#fff;--panel:#faf7f2;--border:#d4c5b0}
body{font-family:'Microsoft YaHei',sans-serif;background:var(--bg);height:100vh;display:flex;overflow:hidden}
.sidebar{width:260px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;padding:20px 0;flex-shrink:0}
.logo{text-align:center;padding:15px 0 5px}
.logo-title{font-size:52px;font-family:'KaiTi','STKaiti','楷体',serif;color:var(--accent);text-shadow:2px 2px 8px rgba(0,0,0,0.5);line-height:1.2}
.logo-poem{font-size:13px;color:#c9a96e99;font-style:italic;margin-top:8px;line-height:1.5;padding:0 15px}
.divider{height:1px;background:linear-gradient(90deg,transparent,#c9a96e55,transparent);margin:12px 20px}
.history-widget{margin:0 15px;background:#ffffff10;border-radius:8px;padding:10px 12px}
.history-widget h4{font-size:11px;color:var(--accent);margin-bottom:6px}
.history-widget p{font-size:12px;color:#ccc;line-height:1.4}
.tools-section{flex:1;padding:0 15px;overflow-y:auto}
.tools-section h3{font-size:12px;color:#c9a96e99;margin:8px 0 8px;text-transform:uppercase;letter-spacing:1px}
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px}
.tool-btn{background:#ffffff10;border:1px solid #ffffff15;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s;text-decoration:none;color:#fff;display:block}
.tool-btn:hover{background:#c9a96e33;border-color:var(--accent);transform:translateY(-2px)}
.tool-btn .icon{font-size:22px;display:block;margin-bottom:4px}
.tool-btn .name{font-size:11px;color:#ccc}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{background:var(--panel);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:var(--text);font-weight:400}
.header .status{font-size:12px;color:#888}
.chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px}
.message{padding:15px 18px;border-radius:12px;max-width:85%;line-height:1.6}
.message.user{align-self:flex-end;background:var(--chat-bg);border:1px solid var(--border)}
.message.ai{background:var(--chat-bg);border:1px solid var(--border)}
.message .thinking{font-size:12px;color:#888;margin-bottom:8px;font-style:italic}
.input-area{background:var(--panel);padding:15px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.input-area textarea{flex:1;padding:12px 15px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:none;font-family:inherit;outline:none;min-height:44px;max-height:120px}
.input-area textarea:focus{border-color:var(--accent)}
.input-area button{padding:12px 25px;background:var(--sidebar);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
.input-area button:hover{background:var(--accent)}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">
<div class="logo-title">问渠</div>
<div class="logo-poem">问渠那得清如许<br>为有源头活水来</div>
</div>
<div class="divider"></div>
<div class="history-widget">
<h4>📅 历史上的今天</h4>
<p><strong>1948</strong> 以色列</p><p><strong>1972</strong> 卫星</p><p><strong>2021</strong> 天宫</p>
</div>
<div class="divider"></div>
<div class="tools-section">
<h3>🔧 工具箱</h3>
<div class="tools-grid">
<a href="https://wenquso.cn/ai.html" target="_blank" class="tool-btn"><span class="icon">🤖</span><span class="name">AI助手</span></a>
<a href="https://liusige377.github.io/wenqu-dl/" target="_blank" class="tool-btn"><span class="icon">📥</span><span class="name">下载器</span></a>
<a href="http://101.133.136.55:3000/admin.html" target="_blank" class="tool-btn"><span class="icon">⚙️</span><span class="name">管理</span></a>
<a href="https://liusige377.github.io/xintengfei-website/" target="_blank" class="tool-btn"><span class="icon">🏢</span><span class="name">鑫腾飞</span></a>
</div>
</div>
</div>
<div class="main">
<div class="header">
<h1>💬 问渠AI助手</h1>
<span class="status">在线</span>
</div>
<div class="chat-container" id="chat">
<div class="message ai">
<span class="thinking">🤔 思考中...</span>
<div>您好！我是问渠AI助手，有什么可以帮您的？</div>
</div>
</div>
<div class="input-area">
<textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
<button onclick="sendMessage()">发送</button>
</div>
</div>
<script>
const API_URL = "http://101.133.136.55:3000";
let chatHistory = [];

async function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if (!msg) return;
    
    addMessage(msg, "user");
    input.value = "";
    
    const thinkingMsg = document.createElement("div");
    thinkingMsg.className = "message ai";
    thinkingMsg.innerHTML = "<span class="thinking">🤔 思考中...</span><div></div>";
    document.getElementById("chat").appendChild(thinkingMsg);
    
    try {
        const resp = await fetch(API_URL + "/v1/chat/completions", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                model: "default",
                messages: [...chatHistory, {role: "user", content: msg}]
            })
        });
        const data = await resp.json();
        const reply = data.choices?.[0]?.message?.content || "抱歉，我暂时无法回答。";
        thinkingMsg.querySelector(".thinking").textContent = "✨";
        thinkingMsg.querySelector("div").textContent = reply;
        chatHistory.push({role: "user", content: msg}, {role: "assistant", content: reply});
    } catch(e) {
        thinkingMsg.querySelector(".thinking").textContent = "❌";
        thinkingMsg.querySelector("div").textContent = "网络错误，请稍后重试。";
    }
}

function addMessage(content, role) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerHTML = "<div>" + content + "</div>";
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

document.getElementById("userInput").addEventListener("keypress", e => {
    if(e.key === "Enter" && !e.shiftKey) {e.preventDefault(); sendMessage();}
});
</script>
</body>
</html>
